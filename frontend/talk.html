<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Filofax Talk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #15231c;
      --muted: #5a6b62;
      --paper: #eef3ee;
      --panel: rgba(250, 252, 249, 0.92);
      --line: rgba(21, 35, 28, 0.1);
      --accent: #0b6b4f;
      --accent-deep: #084f3b;
      --accent-soft: #d4ebe1;
      --good: #0b6b4f;
      --warn: #8a4b12;
      --danger: #8b2e2e;
      --shadow: 0 20px 48px rgba(21, 35, 28, 0.1);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      min-height: 100dvh;
      font-family: "Outfit", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 70% 45% at 8% -5%, #b8dccb 0%, transparent 52%),
        radial-gradient(ellipse 55% 38% at 96% 4%, #d5e2d0 0%, transparent 48%),
        linear-gradient(168deg, #e4ece6 0%, var(--paper) 42%, #dde8e2 100%);
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }
    .stage {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding:
        max(0.9rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(1rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
      gap: 0.75rem;
      max-width: 560px;
      margin: 0 auto;
    }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
    .brand { font-weight: 700; font-size: 0.95rem; color: var(--accent-deep); letter-spacing: 0.01em; }
    .top-actions { display: flex; gap: 0.45rem; }
    .pill {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(21, 35, 28, 0.06);
    }
    .pill.off { opacity: 0.55; }
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.15rem;
      min-height: 0;
    }
    .status {
      min-height: 1.4rem;
      font-size: 0.95rem;
      color: var(--muted);
      text-align: center;
    }
    .status.live { color: var(--good); font-weight: 600; }
    .status.think { color: var(--warn); font-weight: 600; }
    .status.speak { color: var(--accent); font-weight: 600; }
    .status.err { color: var(--danger); font-weight: 600; }
    .orb-wrap {
      position: relative;
      width: min(58vw, 220px);
      height: min(58vw, 220px);
      display: grid;
      place-items: center;
    }
    .orb-ring {
      position: absolute;
      inset: -8%;
      border-radius: 50%;
      border: 1px solid rgba(11, 107, 79, 0.22);
      animation: ringPulse 3.2s ease-in-out infinite;
      pointer-events: none;
    }
    .orb-ring.r2 { inset: -18%; animation-delay: 0.6s; opacity: 0.55; }
    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      background: radial-gradient(circle at 35% 30%, #e8f6ef 0%, #7ec9a8 28%, #0b6b4f 62%, #084f3b 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.35) inset,
        0 20px 60px rgba(11, 107, 79, 0.28),
        0 0 80px rgba(11, 107, 79, 0.18);
      position: relative;
      overflow: hidden;
    }
    .orb::after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.55), transparent 55%);
      pointer-events: none;
    }
    .orb.listening { animation: orbListen 1.1s ease-in-out infinite; }
    .orb.thinking { animation: orbThink 1.4s ease-in-out infinite; filter: saturate(1.15); }
    .orb.speaking { animation: orbSpeak 0.9s ease-in-out infinite; }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.35; }
      50% { transform: scale(1.04); opacity: 0.75; }
    }
    @keyframes orbListen {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes orbThink {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.03) rotate(4deg); }
    }
    @keyframes orbSpeak {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }
    .hint {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      max-width: 20rem;
      line-height: 1.4;
    }
    .transcript {
      width: 100%;
      max-width: 26rem;
      min-height: 4.5rem;
      max-height: 26dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      text-align: center;
      padding: 0.35rem 0.5rem;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid var(--line);
      border-radius: 1rem;
      box-shadow: var(--shadow);
    }
    .line { margin: 0.35rem 0; line-height: 1.45; font-size: 1.02rem; }
    .line.user { color: var(--accent-deep); font-weight: 600; }
    .line.bot { color: var(--ink); }
    .line.interim { color: var(--muted); font-style: italic; }
    .line.meta { color: var(--muted); font-size: 0.85rem; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
      min-height: 2.2rem;
    }
    .chips[hidden] { display: none !important; }
    .chip {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.55rem 0.95rem;
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    .chip.yes {
      background: linear-gradient(145deg, #0d7a5a 0%, #0b6b4f 55%, #095c44 100%);
      color: #f4fffa;
      border: 0;
    }
    .chip.no {
      background: rgba(139, 46, 46, 0.08);
      border-color: rgba(139, 46, 46, 0.28);
      color: var(--danger);
    }
    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
    }
    .foot {
      font-size: 0.75rem;
      color: rgba(90, 107, 98, 0.85);
      text-align: center;
    }
    .foot a { color: var(--accent); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="top">
      <div class="brand">Filofax Talk</div>
      <div class="top-actions">
        <button type="button" class="pill" id="autoBtn" title="Hands-free conversation">🎙 Auto</button>
        <button type="button" class="pill" id="muteBtn">🔊 Voice</button>
        <button type="button" class="pill" id="clearBtn">Clear</button>
      </div>
    </div>

    <div class="main">
      <div class="status" id="status">Starting…</div>
      <div class="orb-wrap">
        <div class="orb-ring" aria-hidden="true"></div>
        <div class="orb-ring r2" aria-hidden="true"></div>
        <button type="button" class="orb" id="orb" aria-label="Tap to talk"></button>
      </div>
      <div class="hint" id="hint">Hands-free — speak naturally, I'll reply automatically</div>
      <div class="transcript" id="transcript" aria-live="polite"></div>
      <div class="chips" id="chips" hidden></div>
    </div>

    <div class="bottom">
      <div class="foot">
        Same model as chat ·
        <a id="chatLink" href="/">Open text chat</a>
      </div>
    </div>
  </div>

  <script>
    const API = (() => {
      const path = window.location.pathname || "";
      if (path === "/filofax" || path.startsWith("/filofax/")) return "/filofax";
      return "";
    })();

    function q(name) {
      return new URLSearchParams(window.location.search || "").get(name) || "";
    }

    function resolveUserId() {
      const fromUrl = (q("userid") || q("user_id") || q("userId")).trim();
      if (fromUrl) {
        try { sessionStorage.setItem("filofax_user_id", fromUrl); } catch (_) {}
        return fromUrl;
      }
      try {
        const saved = sessionStorage.getItem("filofax_user_id");
        if (saved && saved.trim()) return saved.trim();
      } catch (_) {}
      return "default";
    }

    function resolveTimezone() {
      const fromUrl = (q("timezone") || q("timeZone") || q("tz")).trim();
      if (fromUrl) {
        try { sessionStorage.setItem("filofax_timezone", fromUrl); } catch (_) {}
        return fromUrl;
      }
      try {
        const saved = sessionStorage.getItem("filofax_timezone");
        if (saved && saved.trim()) return saved.trim();
      } catch (_) {}
      try {
        return Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Vienna";
      } catch (_) {
        return "Europe/Vienna";
      }
    }

    const userId = resolveUserId();
    const timezone = resolveTimezone();
    let pendingEvent = null;
    let busy = false;
    let speaking = false;
    let listening = false;
    let ttsEnabled = true;
    let recognition = null;
    let finalText = "";
    let interimText = "";
    let silenceTimer = null;
    let autoListenTimer = null;
    let speakGen = 0;
    let intentionallyStopping = false;
    let autoMode = true;
    let micReady = false;
    const SILENCE_MS = 850;

    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    const canSpeak = !!window.speechSynthesis;

    const statusEl = document.getElementById("status");
    const orb = document.getElementById("orb");
    const transcriptEl = document.getElementById("transcript");
    const chipsEl = document.getElementById("chips");
    const autoBtn = document.getElementById("autoBtn");
    const muteBtn = document.getElementById("muteBtn");
    const clearBtn = document.getElementById("clearBtn");
    const chatLink = document.getElementById("chatLink");
    const hintEl = document.getElementById("hint");

    chatLink.href = `${API || ""}/${window.location.search || ""}`;

    function setStatus(text, mode = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (mode ? " " + mode : "");
    }

    function setOrbMode(mode) {
      orb.classList.remove("listening", "thinking", "speaking");
      if (mode) orb.classList.add(mode);
    }

    function clearAutoListenTimer() {
      if (autoListenTimer) {
        clearTimeout(autoListenTimer);
        autoListenTimer = null;
      }
    }

    function scheduleAutoListen(delay = 400) {
      if (!autoMode || busy || listening || speaking) return;
      clearAutoListenTimer();
      autoListenTimer = setTimeout(() => {
        autoListenTimer = null;
        if (!autoMode || busy || listening || speaking) return;
        startListening();
      }, delay);
    }

    function idleStatus() {
      if (busy || speaking || listening) return;
      setOrbMode("");
      if (autoMode) {
        setStatus(micReady ? "Ready — speak anytime" : "Tap orb once to allow mic");
        hintEl.textContent = micReady
          ? "Hands-free on — just talk. Tap orb only to interrupt."
          : "One tap for microphone, then I'll listen automatically.";
        scheduleAutoListen(micReady ? 350 : 1200);
      } else {
        setStatus("Tap orb to talk");
        hintEl.textContent = "Tap to speak · tap again to send · tap while speaking to interrupt";
      }
    }

    function addLine(text, kind = "bot") {
      if (!text) return null;
      const el = document.createElement("div");
      el.className = "line " + kind;
      el.textContent = text;
      transcriptEl.appendChild(el);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      return el;
    }

    function clearInterim() {
      [...transcriptEl.querySelectorAll(".interim")].forEach((n) => n.remove());
    }

    function showInterim(text) {
      clearInterim();
      if (text) addLine(text, "interim");
    }

    function setChips(items, confirm = false) {
      chipsEl.innerHTML = "";
      if (!items || !items.length) {
        chipsEl.hidden = true;
        return;
      }
      chipsEl.hidden = false;
      items.forEach((label) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        const lower = String(label).toLowerCase();
        if (confirm && (lower.startsWith("yes") || lower.includes("save"))) btn.classList.add("yes");
        if (confirm && (lower === "no" || lower.startsWith("no,"))) btn.classList.add("no");
        btn.textContent = label;
        btn.addEventListener("click", () => {
          interruptSpeaking();
          sendChat(label, confirm && (lower.startsWith("yes") || lower.includes("save")));
        });
        chipsEl.appendChild(btn);
      });
    }

    function unlockAudio() {
      if (!canSpeak) return;
      try {
        const u = new SpeechSynthesisUtterance(" ");
        u.volume = 0;
        window.speechSynthesis.speak(u);
      } catch (_) {}
    }

    function interruptSpeaking() {
      if (!speaking && !(canSpeak && window.speechSynthesis.speaking)) return false;
      speakGen += 1;
      speaking = false;
      try { window.speechSynthesis.cancel(); } catch (_) {}
      return true;
    }

    function afterAssistantTurn() {
      if (autoMode) {
        setOrbMode("");
        setStatus("Your turn — speak anytime", "live");
        hintEl.textContent = "Listening automatically after I finish…";
        scheduleAutoListen(300);
      } else {
        idleStatus();
      }
    }

    function speak(text) {
      clearAutoListenTimer();
      if (!ttsEnabled || !canSpeak || !text) {
        speaking = false;
        afterAssistantTurn();
        return Promise.resolve();
      }
      const gen = ++speakGen;
      return new Promise((resolve) => {
        try {
          try { window.speechSynthesis.cancel(); } catch (_) {}
          const u = new SpeechSynthesisUtterance(text);
          u.rate = 1.02;
          const done = () => {
            if (gen !== speakGen) { resolve(); return; }
            speaking = false;
            afterAssistantTurn();
            resolve();
          };
          u.onend = done;
          u.onerror = done;
          speaking = true;
          setOrbMode("speaking");
          setStatus("Speaking… tap to interrupt", "speak");
          hintEl.textContent = autoMode
            ? "Tap orb to interrupt — I'll listen again when I finish."
            : "Tap the orb anytime to interrupt.";
          window.speechSynthesis.speak(u);
        } catch (_) {
          speaking = false;
          afterAssistantTurn();
          resolve();
        }
      });
    }

    async function sendChat(message, confirm = false) {
      const text = String(message || "").trim();
      if (!text) {
        setStatus("I didn't catch that — try again", "err");
        idleStatus();
        return;
      }
      if (busy) return;

      busy = true;
      interruptSpeaking();
      stopListening(false);
      clearInterim();
      addLine(text, "user");
      setChips([]);
      setOrbMode("thinking");
      setStatus("Thinking…", "think");
      hintEl.textContent = "Talking to Filofax assistant…";

      try {
        const body = {
          message: text,
          user_id: userId,
          timezone,
          confirm: Boolean(confirm),
        };
        if (pendingEvent) body.pending_event = pendingEvent;

        const res = await fetch(`${API}/api/assistant/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const raw = await res.text();
        let data = {};
        try { data = raw ? JSON.parse(raw) : {}; } catch (_) {
          throw new Error(raw.slice(0, 180) || ("HTTP " + res.status));
        }
        if (!res.ok) {
          throw new Error(
            (data.error && data.error.message) ||
            data.detail ||
            data.message ||
            ("HTTP " + res.status)
          );
        }

        if (data.pending_event) pendingEvent = data.pending_event;
        if (data.event || data.intent === "cancel_event") pendingEvent = null;

        const reply = data.message || "Okay.";
        addLine(reply, "bot");

        if (data.needs_confirmation) {
          setChips(data.suggested_replies || ["Yes, save", "No"], true);
        } else if (data.suggested_replies && data.suggested_replies.length) {
          setChips(data.suggested_replies, false);
        } else {
          setChips([]);
        }

        busy = false;
        await speak(reply);
      } catch (err) {
        console.error("talk sendChat failed", err);
        setStatus(String(err.message || err), "err");
        addLine("Sorry — " + (err.message || "request failed"), "meta");
        setOrbMode("");
        if (autoMode) scheduleAutoListen(900);
        else idleStatus();
      } finally {
        busy = false;
      }
    }

    function clearSilenceTimer() {
      if (silenceTimer) {
        clearTimeout(silenceTimer);
        silenceTimer = null;
      }
    }

    function currentTranscript() {
      return (finalText + " " + interimText).replace(/\s+/g, " ").trim();
    }

    function armSilenceSend() {
      const text = currentTranscript();
      if (!text) return;
      clearSilenceTimer();
      silenceTimer = setTimeout(() => {
        if (!listening || busy) return;
        if (currentTranscript()) stopListening(true);
      }, SILENCE_MS);
    }

    function stopListening(send) {
      clearSilenceTimer();
      clearAutoListenTimer();
      listening = false;
      intentionallyStopping = true;
      try {
        if (recognition) {
          recognition.onresult = null;
          recognition.onerror = null;
          recognition.onend = null;
          recognition.stop();
        }
      } catch (_) {}
      recognition = null;
      const text = currentTranscript();
      finalText = "";
      interimText = "";
      clearInterim();
      intentionallyStopping = false;
      if (send && text) sendChat(text);
      else if (send && !text) {
        if (autoMode) {
          setStatus("Didn't catch that — listening again", "err");
          scheduleAutoListen(500);
        } else {
          setStatus("No speech heard — try again", "err");
          setTimeout(idleStatus, 1200);
        }
      } else if (!send && !busy && !speaking) {
        idleStatus();
      }
    }

    function startListening() {
      if (!SpeechRecognitionAPI) {
        setStatus("Mic speech needs Chrome/Edge", "err");
        return;
      }
      if (busy || speaking) return;

      clearAutoListenTimer();
      interruptSpeaking();
      unlockAudio();
      stopListening(false);

      finalText = "";
      interimText = "";
      listening = true;
      setOrbMode("listening");
      setStatus("Listening…", "live");
      hintEl.textContent = autoMode
        ? "Speak now — I'll send when you pause."
        : "Speak now. Tap orb again when finished.";

      recognition = new SpeechRecognitionAPI();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = navigator.language || "en-US";

      recognition.onresult = (event) => {
        if (!listening) return;
        let interim = "";
        let finalized = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const r = event.results[i];
          if (r.isFinal) finalized += r[0].transcript;
          else interim += r[0].transcript;
        }
        if (finalized) finalText = (finalText + " " + finalized).trim();
        interimText = interim.trim();
        showInterim((finalText + " " + interimText).trim());
        armSilenceSend();
      };

      recognition.onerror = (event) => {
        const err = (event && event.error) || "";
        if (intentionallyStopping || err === "aborted") return;
        if (err === "no-speech") {
          // keep listening; Chrome sometimes fires this mid-session
          return;
        }
        if (err === "not-allowed") {
          listening = false;
          setStatus("Microphone blocked — allow mic in browser settings", "err");
          setOrbMode("");
          return;
        }
        // network / other: try to send what we have
        if (listening) stopListening(true);
      };

      recognition.onend = () => {
        if (!listening || intentionallyStopping) return;
        // Chrome ends sessions often — restart while user still in listen mode
        try { recognition.start(); } catch (_) {
          stopListening(true);
        }
      };

      try {
        recognition.start();
        micReady = true;
      } catch (err) {
        listening = false;
        micReady = false;
        setStatus("Tap orb once to allow microphone", "err");
        setOrbMode("");
        hintEl.textContent = "Browser needs one tap before hands-free listening.";
        console.error(err);
      }
    }

    orb.addEventListener("click", () => {
      unlockAudio();
      if (speaking || (canSpeak && window.speechSynthesis.speaking)) {
        interruptSpeaking();
        startListening();
        return;
      }
      if (busy) return;
      if (listening) stopListening(true);
      else startListening();
    });

    autoBtn.addEventListener("click", () => {
      autoMode = !autoMode;
      autoBtn.textContent = autoMode ? "🎙 Auto" : "🎙 Manual";
      autoBtn.classList.toggle("off", !autoMode);
      if (autoMode && !busy && !speaking && !listening) scheduleAutoListen(200);
      else if (!autoMode) clearAutoListenTimer();
      idleStatus();
      unlockAudio();
    });

    muteBtn.addEventListener("click", () => {
      ttsEnabled = !ttsEnabled;
      muteBtn.textContent = ttsEnabled ? "🔊 Voice" : "🔇 Muted";
      muteBtn.classList.toggle("off", !ttsEnabled);
      if (!ttsEnabled) interruptSpeaking();
      unlockAudio();
    });

    clearBtn.addEventListener("click", async () => {
      unlockAudio();
      clearAutoListenTimer();
      interruptSpeaking();
      stopListening(false);
      pendingEvent = null;
      transcriptEl.innerHTML = "";
      setChips([]);
      try {
        await fetch(`${API}/api/events?user_id=${encodeURIComponent(userId)}`, { method: "DELETE" });
      } catch (_) {}
      const cleared = "Cleared. Let's set up the event. What is the date and time?";
      addLine(cleared, "bot");
      speak(cleared);
    });

    const welcome = "Let's set up the event. What is the date and time for this event?";
    addLine(welcome, "bot");
    setStatus("Starting…", "think");
    setTimeout(() => {
      unlockAudio();
      speak(welcome);
    }, 350);
  </script>
</body>
</html>
