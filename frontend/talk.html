<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Filofax Talk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #15231c;
      --muted: #5a6b62;
      --paper: #e8efe9;
      --panel: rgba(250, 252, 249, 0.88);
      --line: rgba(21, 35, 28, 0.1);
      --accent: #0b6b4f;
      --accent-deep: #084f3b;
      --accent-soft: #d4ebe1;
      --good: #0b6b4f;
      --warn: #9a5a18;
      --danger: #8b2e2e;
      --shadow: 0 18px 42px rgba(21, 35, 28, 0.1);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      min-height: 100dvh;
      font-family: "Outfit", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 72% 48% at 12% -8%, rgba(126, 201, 168, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 94% 8%, rgba(184, 210, 190, 0.45) 0%, transparent 50%),
        linear-gradient(168deg, #e2ebe4 0%, var(--paper) 45%, #d9e5de 100%);
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      transition: background 0.6s var(--ease);
    }
    body.mode-listening {
      background:
        radial-gradient(ellipse 70% 50% at 50% 42%, rgba(11, 107, 79, 0.14) 0%, transparent 55%),
        radial-gradient(ellipse 72% 48% at 12% -8%, rgba(126, 201, 168, 0.5) 0%, transparent 55%),
        linear-gradient(168deg, #e2ebe4 0%, var(--paper) 45%, #d9e5de 100%);
    }
    body.mode-thinking {
      background:
        radial-gradient(ellipse 65% 48% at 50% 40%, rgba(154, 90, 24, 0.1) 0%, transparent 58%),
        radial-gradient(ellipse 72% 48% at 12% -8%, rgba(200, 180, 140, 0.35) 0%, transparent 55%),
        linear-gradient(168deg, #ebe6df 0%, #e8efe9 45%, #dde8e2 100%);
    }
    body.mode-speaking {
      background:
        radial-gradient(ellipse 70% 52% at 50% 40%, rgba(11, 107, 79, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse 55% 40% at 90% 10%, rgba(126, 201, 168, 0.4) 0%, transparent 48%),
        linear-gradient(168deg, #dceee5 0%, var(--paper) 42%, #d5e6dd 100%);
    }

    .stage {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding:
        max(0.85rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(1rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
      gap: 0.85rem;
      max-width: 560px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.55rem 0.65rem 0.55rem 0.85rem;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      animation: fadeSlideDown 0.55s var(--ease) both;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      min-width: 0;
    }
    .brand-mark {
      width: 1.65rem;
      height: 1.65rem;
      border-radius: 0.45rem;
      background: linear-gradient(145deg, #0d7a5a, #084f3b);
      box-shadow: 0 4px 12px rgba(11, 107, 79, 0.28);
      flex-shrink: 0;
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 28% 32% 28% 32%;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.85);
    }
    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
      min-width: 0;
    }
    .brand-name {
      font-family: "Fraunces", serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--accent-deep);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .brand-sub {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .top-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .pill {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.75);
      color: var(--ink);
      border-radius: 0.65rem;
      padding: 0.42rem 0.7rem;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, opacity 0.2s;
    }
    .pill:hover { background: #fff; }
    .pill:active { transform: scale(0.97); }
    .pill.off { opacity: 0.5; }
    .pill.on {
      background: var(--accent-soft);
      border-color: rgba(11, 107, 79, 0.25);
      color: var(--accent-deep);
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 0;
      animation: fadeIn 0.7s var(--ease) 0.1s both;
    }

    .status-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      min-height: 2.6rem;
    }
    .status {
      min-height: 1.35rem;
      font-size: 0.98rem;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
      letter-spacing: -0.01em;
      transition: color 0.25s;
    }
    .status.live { color: var(--good); font-weight: 600; }
    .status.think { color: var(--warn); font-weight: 600; }
    .status.speak { color: var(--accent); font-weight: 600; }
    .status.err { color: var(--danger); font-weight: 600; }

    .process {
      display: none;
      align-items: center;
      gap: 0.55rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid var(--line);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    body.mode-thinking .process,
    body.mode-speaking .process,
    body.mode-listening .process {
      display: inline-flex;
      animation: fadeSlideUp 0.35s var(--ease) both;
    }
    .process-dots span {
      display: inline-block;
      width: 0.35rem;
      height: 0.35rem;
      border-radius: 50%;
      background: currentColor;
      margin: 0 0.1rem;
      animation: dotBounce 1.1s ease-in-out infinite;
    }
    .process-dots span:nth-child(2) { animation-delay: 0.15s; }
    .process-dots span:nth-child(3) { animation-delay: 0.3s; }
    body.mode-thinking .process { color: var(--warn); }
    body.mode-speaking .process { color: var(--accent); }
    body.mode-listening .process { color: var(--good); }
    .process-label::after { content: attr(data-label); }

    .orb-wrap {
      position: relative;
      width: min(54vw, 210px);
      height: min(54vw, 210px);
      display: grid;
      place-items: center;
    }
    .orb-aura {
      position: absolute;
      inset: -22%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(11, 107, 79, 0.18) 0%, transparent 68%);
      opacity: 0.55;
      transition: opacity 0.4s, transform 0.4s;
      pointer-events: none;
    }
    body.mode-listening .orb-aura {
      opacity: 1;
      animation: auraPulse 1.8s ease-in-out infinite;
    }
    body.mode-thinking .orb-aura {
      opacity: 0.9;
      background: radial-gradient(circle, rgba(154, 90, 24, 0.16) 0%, transparent 68%);
      animation: auraSpin 4s linear infinite;
    }
    body.mode-speaking .orb-aura {
      opacity: 1;
      animation: auraPulse 1.2s ease-in-out infinite;
    }

    .orb-ring {
      position: absolute;
      inset: -6%;
      border-radius: 50%;
      border: 1.5px solid rgba(11, 107, 79, 0.2);
      pointer-events: none;
      opacity: 0.4;
    }
    .orb-ring.r2 { inset: -16%; opacity: 0.25; }
    .orb-ring.r3 {
      inset: -28%;
      opacity: 0;
      border-style: dashed;
      border-color: rgba(11, 107, 79, 0.28);
    }
    body.mode-listening .orb-ring {
      animation: ringExpand 2s ease-out infinite;
      opacity: 0.7;
    }
    body.mode-listening .orb-ring.r2 { animation-delay: 0.45s; }
    body.mode-listening .orb-ring.r3 {
      animation: ringExpand 2s ease-out infinite 0.9s;
      opacity: 0.5;
    }
    body.mode-thinking .orb-ring {
      border-color: rgba(154, 90, 24, 0.35);
      animation: ringSpin 3.2s linear infinite;
      opacity: 0.85;
    }
    body.mode-thinking .orb-ring.r2 {
      animation: ringSpin 4.5s linear infinite reverse;
      border-style: dashed;
    }
    body.mode-thinking .orb-ring.r3 {
      opacity: 0.4;
      animation: ringSpin 6s linear infinite;
    }
    body.mode-speaking .orb-ring {
      animation: ringExpand 1.4s ease-out infinite;
      border-color: rgba(11, 107, 79, 0.35);
      opacity: 0.8;
    }
    body.mode-speaking .orb-ring.r2 { animation-delay: 0.35s; }
    body.mode-speaking .orb-ring.r3 {
      animation: ringExpand 1.4s ease-out infinite 0.7s;
      opacity: 0.45;
    }

    .orbit {
      position: absolute;
      inset: -10%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    body.mode-thinking .orbit { opacity: 1; animation: orbitSpin 2.8s linear infinite; }
    .orbit span {
      position: absolute;
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #c47a2a;
      box-shadow: 0 0 10px rgba(196, 122, 42, 0.55);
    }
    .orbit span:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
    .orbit span:nth-child(2) { bottom: 12%; right: 8%; background: #0b6b4f; box-shadow: 0 0 10px rgba(11, 107, 79, 0.45); }
    .orbit span:nth-child(3) { bottom: 12%; left: 8%; background: #7ec9a8; box-shadow: 0 0 10px rgba(126, 201, 168, 0.55); }

    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      background: radial-gradient(circle at 35% 28%, #f0faf5 0%, #8fd4b4 26%, #0b6b4f 58%, #063d2e 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.35) inset,
        0 22px 55px rgba(11, 107, 79, 0.3),
        0 0 70px rgba(11, 107, 79, 0.16);
      position: relative;
      overflow: hidden;
      transition: transform 0.25s var(--ease), filter 0.3s;
      animation: orbIdle 4.5s ease-in-out infinite;
    }
    .orb:hover { filter: brightness(1.05); }
    .orb:active { transform: scale(0.97); }
    .orb::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 40% 32%, rgba(255,255,255,0.5), transparent 52%);
      pointer-events: none;
    }
    .orb.listening { animation: orbListen 1.15s ease-in-out infinite; }
    .orb.thinking {
      animation: orbThink 1.6s ease-in-out infinite;
      filter: saturate(1.05) brightness(0.98);
    }
    .orb.speaking { animation: orbSpeak 0.85s ease-in-out infinite; }

    .orb-core {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 1;
    }
    .orb-icon {
      width: 2.4rem;
      height: 2.4rem;
      opacity: 0.92;
      transition: opacity 0.25s, transform 0.35s var(--ease);
    }
    .orb-icon svg { width: 100%; height: 100%; display: block; }
    body.mode-thinking .orb-icon,
    body.mode-speaking .orb-icon { opacity: 0; transform: scale(0.7); }

    .wave {
      position: absolute;
      display: none;
      align-items: flex-end;
      justify-content: center;
      gap: 0.28rem;
      height: 2.6rem;
      z-index: 2;
    }
    body.mode-speaking .wave { display: flex; }
    body.mode-thinking .wave { display: none; }
    .wave i {
      display: block;
      width: 0.32rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      height: 0.7rem;
      animation: waveBar 0.85s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.35);
    }
    .wave i:nth-child(1) { animation-delay: 0s; height: 0.9rem; }
    .wave i:nth-child(2) { animation-delay: 0.12s; height: 1.5rem; }
    .wave i:nth-child(3) { animation-delay: 0.22s; height: 2.2rem; }
    .wave i:nth-child(4) { animation-delay: 0.1s; height: 1.35rem; }
    .wave i:nth-child(5) { animation-delay: 0.28s; height: 0.85rem; }

    .think-spinner {
      position: absolute;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 255, 255, 0.22);
      border-top-color: rgba(255, 255, 255, 0.95);
      border-right-color: rgba(255, 230, 190, 0.85);
      display: none;
      z-index: 2;
      animation: spin 0.9s linear infinite;
    }
    body.mode-thinking .think-spinner { display: block; }

    .hint {
      font-size: 0.86rem;
      color: var(--muted);
      text-align: center;
      max-width: 21rem;
      line-height: 1.45;
      transition: opacity 0.3s;
    }

    .transcript {
      width: 100%;
      max-width: 26rem;
      min-height: 4.75rem;
      max-height: 24dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      text-align: left;
      padding: 0.75rem 0.9rem;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.05rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }
    .line {
      margin: 0.4rem 0;
      line-height: 1.45;
      font-size: 0.95rem;
      animation: lineIn 0.35s var(--ease) both;
    }
    .line.user {
      color: var(--accent-deep);
      font-weight: 600;
      padding-left: 0.55rem;
      border-left: 2.5px solid var(--accent);
    }
    .line.bot { color: var(--ink); }
    .line.interim { color: var(--muted); font-style: italic; }
    .line.meta { color: var(--muted); font-size: 0.84rem; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
      min-height: 0;
    }
    .chips[hidden] { display: none !important; }
    .chip {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border-radius: 0.75rem;
      padding: 0.55rem 0.95rem;
      font: inherit;
      font-size: 0.86rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      animation: fadeSlideUp 0.4s var(--ease) both;
    }
    .chip:hover { box-shadow: 0 6px 16px rgba(21, 35, 28, 0.08); }
    .chip:active { transform: scale(0.97); }
    .chip.yes {
      background: linear-gradient(145deg, #0d7a5a 0%, #0b6b4f 55%, #095c44 100%);
      color: #f4fffa;
      border: 0;
    }
    .chip.no {
      background: rgba(139, 46, 46, 0.07);
      border-color: rgba(139, 46, 46, 0.25);
      color: var(--danger);
    }

    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      animation: fadeIn 0.6s var(--ease) 0.2s both;
    }
    .foot {
      font-size: 0.74rem;
      color: rgba(90, 107, 98, 0.9);
      text-align: center;
    }
    .foot a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .foot a:hover { text-decoration: underline; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes orbIdle {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.015); }
    }
    @keyframes orbListen {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.055); }
    }
    @keyframes orbThink {
      0%, 100% { transform: scale(1); filter: saturate(1.05) brightness(0.98); }
      50% { transform: scale(1.04); filter: saturate(1.12) brightness(1.02); }
    }
    @keyframes orbSpeak {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    @keyframes ringExpand {
      0% { transform: scale(0.92); opacity: 0.75; }
      100% { transform: scale(1.12); opacity: 0; }
    }
    @keyframes ringSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes orbitSpin {
      to { transform: rotate(360deg); }
    }
    @keyframes auraPulse {
      0%, 100% { transform: scale(1); opacity: 0.55; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes auraSpin {
      0% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.06); }
      100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes waveBar {
      0%, 100% { transform: scaleY(0.45); }
      50% { transform: scaleY(1); }
    }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-3px); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <header class="top">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="brand-name">Filofax</div>
          <div class="brand-sub">Voice assistant</div>
        </div>
      </div>
      <div class="top-actions">
        <button type="button" class="pill on" id="autoBtn" title="Hands-free conversation">Auto</button>
        <button type="button" class="pill on" id="muteBtn" title="Toggle voice replies">Voice</button>
        <button type="button" class="pill" id="clearBtn">Clear</button>
      </div>
    </header>

    <main class="main">
      <div class="status-block">
        <div class="status" id="status">Starting…</div>
        <div class="process" id="process" aria-hidden="true">
          <span class="process-dots" aria-hidden="true"><span></span><span></span><span></span></span>
          <span class="process-label" id="processLabel" data-label="Processing"></span>
        </div>
      </div>

      <div class="orb-wrap">
        <div class="orb-aura" aria-hidden="true"></div>
        <div class="orb-ring" aria-hidden="true"></div>
        <div class="orb-ring r2" aria-hidden="true"></div>
        <div class="orb-ring r3" aria-hidden="true"></div>
        <div class="orbit" aria-hidden="true"><span></span><span></span><span></span></div>
        <button type="button" class="orb" id="orb" aria-label="Tap to talk">
          <span class="orb-core">
            <span class="orb-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 3.5a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0v-5a3 3 0 0 0-3-3Z" stroke="#fff" stroke-width="1.7"/>
                <path d="M7 11.5a5 5 0 0 0 10 0M12 16.5v3.2M9.5 19.7h5" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="think-spinner" aria-hidden="true"></span>
            <span class="wave" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
          </span>
        </button>
      </div>

      <div class="hint" id="hint">Hands-free — speak naturally, I'll reply automatically</div>
      <div class="transcript" id="transcript" aria-live="polite"></div>
      <div class="chips" id="chips" hidden></div>
    </main>

    <footer class="bottom">
      <div class="foot">
        Same model as chat ·
        <a id="chatLink" href="/">Open text chat</a>
      </div>
    </footer>
  </div>

  <script>
    const API = (() => {
      const path = window.location.pathname || "";
      if (path === "/filofax" || path.startsWith("/filofax/")) return "/filofax";
      return "";
    })();

    function q(name) {
      return new URLSearchParams(window.location.search || "").get(name) || "";
    }

    function resolveUserId() {
      const fromUrl = (q("userid") || q("user_id") || q("userId")).trim();
      if (fromUrl) {
        try { sessionStorage.setItem("filofax_user_id", fromUrl); } catch (_) {}
        return fromUrl;
      }
      try {
        const saved = sessionStorage.getItem("filofax_user_id");
        if (saved && saved.trim()) return saved.trim();
      } catch (_) {}
      return "default";
    }

    function resolveTimezone() {
      const fromUrl = (q("timezone") || q("timeZone") || q("tz")).trim();
      if (fromUrl) {
        try { sessionStorage.setItem("filofax_timezone", fromUrl); } catch (_) {}
        return fromUrl;
      }
      try {
        const saved = sessionStorage.getItem("filofax_timezone");
        if (saved && saved.trim()) return saved.trim();
      } catch (_) {}
      try {
        return Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Vienna";
      } catch (_) {
        return "Europe/Vienna";
      }
    }

    const userId = resolveUserId();
    const timezone = resolveTimezone();
    let pendingEvent = null;
    let busy = false;
    let speaking = false;
    let listening = false;
    let ttsEnabled = true;
    let recognition = null;
    let finalText = "";
    let interimText = "";
    let silenceTimer = null;
    let autoListenTimer = null;
    let speakGen = 0;
    let intentionallyStopping = false;
    let autoMode = true;
    let micReady = false;
    const SILENCE_MS = 850;

    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    const canSpeak = !!window.speechSynthesis;

    const statusEl = document.getElementById("status");
    const processLabel = document.getElementById("processLabel");
    const orb = document.getElementById("orb");
    const transcriptEl = document.getElementById("transcript");
    const chipsEl = document.getElementById("chips");
    const autoBtn = document.getElementById("autoBtn");
    const muteBtn = document.getElementById("muteBtn");
    const clearBtn = document.getElementById("clearBtn");
    const chatLink = document.getElementById("chatLink");
    const hintEl = document.getElementById("hint");

    chatLink.href = `${API || ""}/${window.location.search || ""}`;

    const PROCESS_LABELS = {
      listening: "Listening",
      thinking: "Processing",
      speaking: "Replying",
    };

    function setStatus(text, mode = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (mode ? " " + mode : "");
    }

    function setOrbMode(mode) {
      orb.classList.remove("listening", "thinking", "speaking");
      document.body.classList.remove("mode-listening", "mode-thinking", "mode-speaking");
      if (mode) {
        orb.classList.add(mode);
        document.body.classList.add("mode-" + mode);
        processLabel.setAttribute("data-label", PROCESS_LABELS[mode] || "Active");
      }
    }

    function clearAutoListenTimer() {
      if (autoListenTimer) {
        clearTimeout(autoListenTimer);
        autoListenTimer = null;
      }
    }

    function scheduleAutoListen(delay = 400) {
      if (!autoMode || busy || listening || speaking) return;
      clearAutoListenTimer();
      autoListenTimer = setTimeout(() => {
        autoListenTimer = null;
        if (!autoMode || busy || listening || speaking) return;
        startListening();
      }, delay);
    }

    function idleStatus() {
      if (busy || speaking || listening) return;
      setOrbMode("");
      if (autoMode) {
        setStatus(micReady ? "Ready — speak anytime" : "Tap orb once to allow mic");
        hintEl.textContent = micReady
          ? "Hands-free on — just talk. Tap orb only to interrupt."
          : "One tap for microphone, then I'll listen automatically.";
        scheduleAutoListen(micReady ? 350 : 1200);
      } else {
        setStatus("Tap orb to talk");
        hintEl.textContent = "Tap to speak · tap again to send · tap while speaking to interrupt";
      }
    }

    function addLine(text, kind = "bot") {
      if (!text) return null;
      const el = document.createElement("div");
      el.className = "line " + kind;
      el.textContent = text;
      transcriptEl.appendChild(el);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      return el;
    }

    function clearInterim() {
      [...transcriptEl.querySelectorAll(".interim")].forEach((n) => n.remove());
    }

    function showInterim(text) {
      clearInterim();
      if (text) addLine(text, "interim");
    }

    function setChips(items, confirm = false) {
      chipsEl.innerHTML = "";
      if (!items || !items.length) {
        chipsEl.hidden = true;
        return;
      }
      chipsEl.hidden = false;
      items.forEach((label) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        const lower = String(label).toLowerCase();
        if (confirm && (lower.startsWith("yes") || lower.includes("save"))) btn.classList.add("yes");
        if (confirm && (lower === "no" || lower.startsWith("no,"))) btn.classList.add("no");
        btn.textContent = label;
        btn.addEventListener("click", () => {
          interruptSpeaking();
          sendChat(label, confirm && (lower.startsWith("yes") || lower.includes("save")));
        });
        chipsEl.appendChild(btn);
      });
    }

    function unlockAudio() {
      if (!canSpeak) return;
      try {
        const u = new SpeechSynthesisUtterance(" ");
        u.volume = 0;
        window.speechSynthesis.speak(u);
      } catch (_) {}
    }

    function interruptSpeaking() {
      if (!speaking && !(canSpeak && window.speechSynthesis.speaking)) return false;
      speakGen += 1;
      speaking = false;
      try { window.speechSynthesis.cancel(); } catch (_) {}
      return true;
    }

    function afterAssistantTurn() {
      if (autoMode) {
        setOrbMode("");
        setStatus("Your turn — speak anytime", "live");
        hintEl.textContent = "Listening automatically after I finish…";
        scheduleAutoListen(300);
      } else {
        idleStatus();
      }
    }

    function speak(text) {
      clearAutoListenTimer();
      if (!ttsEnabled || !canSpeak || !text) {
        speaking = false;
        afterAssistantTurn();
        return Promise.resolve();
      }
      const gen = ++speakGen;
      return new Promise((resolve) => {
        try {
          try { window.speechSynthesis.cancel(); } catch (_) {}
          const u = new SpeechSynthesisUtterance(text);
          u.rate = 1.02;
          const done = () => {
            if (gen !== speakGen) { resolve(); return; }
            speaking = false;
            afterAssistantTurn();
            resolve();
          };
          u.onend = done;
          u.onerror = done;
          speaking = true;
          setOrbMode("speaking");
          setStatus("Speaking… tap to interrupt", "speak");
          hintEl.textContent = autoMode
            ? "Tap orb to interrupt — I'll listen again when I finish."
            : "Tap the orb anytime to interrupt.";
          window.speechSynthesis.speak(u);
        } catch (_) {
          speaking = false;
          afterAssistantTurn();
          resolve();
        }
      });
    }

    async function sendChat(message, confirm = false) {
      const text = String(message || "").trim();
      if (!text) {
        setStatus("I didn't catch that — try again", "err");
        idleStatus();
        return;
      }
      if (busy) return;

      busy = true;
      interruptSpeaking();
      stopListening(false);
      clearInterim();
      addLine(text, "user");
      setChips([]);
      setOrbMode("thinking");
      setStatus("Thinking…", "think");
      hintEl.textContent = "Talking to Filofax assistant…";

      try {
        const body = {
          message: text,
          user_id: userId,
          timezone,
          confirm: Boolean(confirm),
        };
        if (pendingEvent) body.pending_event = pendingEvent;

        const res = await fetch(`${API}/api/assistant/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const raw = await res.text();
        let data = {};
        try { data = raw ? JSON.parse(raw) : {}; } catch (_) {
          throw new Error(raw.slice(0, 180) || ("HTTP " + res.status));
        }
        if (!res.ok) {
          throw new Error(
            (data.error && data.error.message) ||
            data.detail ||
            data.message ||
            ("HTTP " + res.status)
          );
        }

        if (data.pending_event) pendingEvent = data.pending_event;
        if (data.event || data.intent === "cancel_event") pendingEvent = null;

        const reply = data.message || "Okay.";
        addLine(reply, "bot");

        if (data.needs_confirmation) {
          setChips(data.suggested_replies || ["Yes, save", "No"], true);
        } else if (data.suggested_replies && data.suggested_replies.length) {
          setChips(data.suggested_replies, false);
        } else {
          setChips([]);
        }

        busy = false;
        await speak(reply);
      } catch (err) {
        console.error("talk sendChat failed", err);
        setStatus(String(err.message || err), "err");
        addLine("Sorry — " + (err.message || "request failed"), "meta");
        setOrbMode("");
        if (autoMode) scheduleAutoListen(900);
        else idleStatus();
      } finally {
        busy = false;
      }
    }

    function clearSilenceTimer() {
      if (silenceTimer) {
        clearTimeout(silenceTimer);
        silenceTimer = null;
      }
    }

    function currentTranscript() {
      return (finalText + " " + interimText).replace(/\s+/g, " ").trim();
    }

    function armSilenceSend() {
      const text = currentTranscript();
      if (!text) return;
      clearSilenceTimer();
      silenceTimer = setTimeout(() => {
        if (!listening || busy) return;
        if (currentTranscript()) stopListening(true);
      }, SILENCE_MS);
    }

    function stopListening(send) {
      clearSilenceTimer();
      clearAutoListenTimer();
      listening = false;
      intentionallyStopping = true;
      try {
        if (recognition) {
          recognition.onresult = null;
          recognition.onerror = null;
          recognition.onend = null;
          recognition.stop();
        }
      } catch (_) {}
      recognition = null;
      const text = currentTranscript();
      finalText = "";
      interimText = "";
      clearInterim();
      intentionallyStopping = false;
      if (send && text) sendChat(text);
      else if (send && !text) {
        if (autoMode) {
          setStatus("Didn't catch that — listening again", "err");
          scheduleAutoListen(500);
        } else {
          setStatus("No speech heard — try again", "err");
          setTimeout(idleStatus, 1200);
        }
      } else if (!send && !busy && !speaking) {
        idleStatus();
      }
    }

    function startListening() {
      if (!SpeechRecognitionAPI) {
        setStatus("Mic speech needs Chrome/Edge", "err");
        return;
      }
      if (busy || speaking) return;

      clearAutoListenTimer();
      interruptSpeaking();
      unlockAudio();
      stopListening(false);

      finalText = "";
      interimText = "";
      listening = true;
      setOrbMode("listening");
      setStatus("Listening…", "live");
      hintEl.textContent = autoMode
        ? "Speak now — I'll send when you pause."
        : "Speak now. Tap orb again when finished.";

      recognition = new SpeechRecognitionAPI();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = navigator.language || "en-US";

      recognition.onresult = (event) => {
        if (!listening) return;
        let interim = "";
        let finalized = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const r = event.results[i];
          if (r.isFinal) finalized += r[0].transcript;
          else interim += r[0].transcript;
        }
        if (finalized) finalText = (finalText + " " + finalized).trim();
        interimText = interim.trim();
        showInterim((finalText + " " + interimText).trim());
        armSilenceSend();
      };

      recognition.onerror = (event) => {
        const err = (event && event.error) || "";
        if (intentionallyStopping || err === "aborted") return;
        if (err === "no-speech") return;
        if (err === "not-allowed") {
          listening = false;
          setStatus("Microphone blocked — allow mic in browser settings", "err");
          setOrbMode("");
          return;
        }
        if (listening) stopListening(true);
      };

      recognition.onend = () => {
        if (!listening || intentionallyStopping) return;
        try { recognition.start(); } catch (_) {
          stopListening(true);
        }
      };

      try {
        recognition.start();
        micReady = true;
      } catch (err) {
        listening = false;
        micReady = false;
        setStatus("Tap orb once to allow microphone", "err");
        setOrbMode("");
        hintEl.textContent = "Browser needs one tap before hands-free listening.";
        console.error(err);
      }
    }

    orb.addEventListener("click", () => {
      unlockAudio();
      if (speaking || (canSpeak && window.speechSynthesis.speaking)) {
        interruptSpeaking();
        startListening();
        return;
      }
      if (busy) return;
      if (listening) stopListening(true);
      else startListening();
    });

    autoBtn.addEventListener("click", () => {
      autoMode = !autoMode;
      autoBtn.textContent = autoMode ? "Auto" : "Manual";
      autoBtn.classList.toggle("off", !autoMode);
      autoBtn.classList.toggle("on", autoMode);
      if (autoMode && !busy && !speaking && !listening) scheduleAutoListen(200);
      else if (!autoMode) clearAutoListenTimer();
      idleStatus();
      unlockAudio();
    });

    muteBtn.addEventListener("click", () => {
      ttsEnabled = !ttsEnabled;
      muteBtn.textContent = ttsEnabled ? "Voice" : "Muted";
      muteBtn.classList.toggle("off", !ttsEnabled);
      muteBtn.classList.toggle("on", ttsEnabled);
      if (!ttsEnabled) interruptSpeaking();
      unlockAudio();
    });

    clearBtn.addEventListener("click", async () => {
      unlockAudio();
      clearAutoListenTimer();
      interruptSpeaking();
      stopListening(false);
      pendingEvent = null;
      transcriptEl.innerHTML = "";
      setChips([]);
      try {
        await fetch(`${API}/api/events?user_id=${encodeURIComponent(userId)}`, { method: "DELETE" });
      } catch (_) {}
      const cleared = "Cleared. Let's set up the event. What is the date and time?";
      addLine(cleared, "bot");
      speak(cleared);
    });

    const welcome = "Let's set up the event. What is the date and time for this event?";
    addLine(welcome, "bot");
    setStatus("Starting…", "think");
    setOrbMode("thinking");
    setTimeout(() => {
      unlockAudio();
      speak(welcome);
    }, 350);
  </script>
</body>
</html>
