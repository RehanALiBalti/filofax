<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Filofax Talk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #070a12;
      --bg1: #10182a;
      --ink: #edf2ff;
      --muted: #9aa8c7;
      --accent: #6ea8ff;
      --accent2: #8b7bff;
      --good: #5be2b2;
      --warn: #ffd27a;
      --danger: #ff7b8a;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      min-height: 100dvh;
      font-family: "Outfit", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 55% at 50% 15%, rgba(110, 168, 255, 0.22), transparent 55%),
        radial-gradient(ellipse 70% 50% at 80% 90%, rgba(139, 123, 255, 0.16), transparent 50%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }
    .stage {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding:
        max(0.9rem, env(safe-area-inset-top))
        max(1rem, env(safe-area-inset-right))
        max(1rem, env(safe-area-inset-bottom))
        max(1rem, env(safe-area-inset-left));
      gap: 0.75rem;
      max-width: 560px;
      margin: 0 auto;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .brand {
      font-weight: 600;
      letter-spacing: 0.02em;
      font-size: 0.95rem;
      opacity: 0.92;
    }
    .top-actions {
      display: flex;
      gap: 0.45rem;
    }
    .pill {
      border: 1px solid rgba(237, 242, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      font: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }
    .pill:active { transform: scale(0.97); }
    .pill.off { opacity: 0.55; }
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      min-height: 0;
    }
    .status {
      min-height: 1.4rem;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-align: center;
    }
    .status.live { color: var(--good); }
    .status.think { color: var(--warn); }
    .status.speak { color: var(--accent); }
    .status.err { color: var(--danger); }

    .orb-wrap {
      position: relative;
      width: min(58vw, 220px);
      height: min(58vw, 220px);
      display: grid;
      place-items: center;
    }
    .orb-ring {
      position: absolute;
      inset: -8%;
      border-radius: 50%;
      border: 1px solid rgba(110, 168, 255, 0.18);
      animation: ringPulse 3.2s ease-in-out infinite;
      pointer-events: none;
    }
    .orb-ring.r2 { inset: -18%; animation-delay: 0.6s; opacity: 0.55; }
    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      background:
        radial-gradient(circle at 35% 30%, #d7e7ff 0%, #8eb6ff 28%, #6a7dff 62%, #3c2f8c 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12) inset,
        0 20px 60px rgba(80, 120, 255, 0.35),
        0 0 80px rgba(110, 168, 255, 0.25);
      transition: transform 0.2s ease, filter 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .orb::after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.55), transparent 55%);
      pointer-events: none;
    }
    .orb:active { transform: scale(0.97); }
    .orb.listening {
      animation: orbListen 1.1s ease-in-out infinite;
      filter: saturate(1.15);
    }
    .orb.thinking {
      animation: orbThink 1.4s ease-in-out infinite;
      filter: hue-rotate(25deg);
    }
    .orb.speaking {
      animation: orbSpeak 0.9s ease-in-out infinite;
      filter: saturate(1.25) brightness(1.05);
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.35; }
      50% { transform: scale(1.04); opacity: 0.75; }
    }
    @keyframes orbListen {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 1px rgba(255,255,255,0.12) inset, 0 0 40px rgba(91, 226, 178, 0.35); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 1px rgba(255,255,255,0.18) inset, 0 0 70px rgba(91, 226, 178, 0.55); }
    }
    @keyframes orbThink {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.03) rotate(4deg); }
    }
    @keyframes orbSpeak {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    .hint {
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      max-width: 20rem;
      line-height: 1.4;
    }
    .orb.speaking {
      cursor: pointer;
    }

    .transcript {
      width: 100%;
      max-width: 26rem;
      min-height: 4.5rem;
      max-height: 28dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      text-align: center;
      padding: 0.35rem 0.5rem;
    }
    .line {
      margin: 0.35rem 0;
      line-height: 1.45;
      font-size: 1.02rem;
      animation: fadeUp 0.28s ease both;
    }
    .line.user { color: #cfe0ff; font-weight: 500; }
    .line.bot { color: var(--ink); }
    .line.interim { color: var(--muted); font-style: italic; }
    .line.meta { color: var(--muted); font-size: 0.85rem; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
      min-height: 2.4rem;
    }
    .chips[hidden] { display: none !important; }
    .chip {
      border: 1px solid rgba(237, 242, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: var(--ink);
      border-radius: 999px;
      padding: 0.55rem 0.95rem;
      font: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }
    .chip.yes {
      background: linear-gradient(135deg, #5be2b2, #4aa8ff);
      color: #061018;
      border: 0;
    }
    .chip.no {
      background: rgba(255, 123, 138, 0.15);
      border-color: rgba(255, 123, 138, 0.35);
    }

    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
    }
    .foot {
      font-size: 0.75rem;
      color: rgba(154, 168, 199, 0.75);
      text-align: center;
    }
    .foot a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="top">
      <div class="brand">Filofax Talk</div>
      <div class="top-actions">
        <button type="button" class="pill" id="muteBtn" title="Toggle voice replies">🔊 Voice</button>
        <button type="button" class="pill" id="clearBtn" title="Clear draft">Clear</button>
      </div>
    </div>

    <div class="main">
      <div class="status" id="status">Tap to talk · interrupt anytime</div>
      <div class="orb-wrap">
        <div class="orb-ring" aria-hidden="true"></div>
        <div class="orb-ring r2" aria-hidden="true"></div>
        <button type="button" class="orb" id="orb" aria-label="Tap to talk"></button>
      </div>
      <div class="hint" id="hint">You can interrupt while I'm speaking — tap the orb or just talk.</div>
      <div class="transcript" id="transcript" aria-live="polite"></div>
      <div class="chips" id="chips" hidden></div>
    </div>

    <div class="bottom">
      <div class="foot">
        Same model as chat ·
        <a id="chatLink" href="/">Open text chat</a>
      </div>
    </div>
  </div>

  <script>
    const API = (() => {
      const path = window.location.pathname || "";
      if (path === "/filofax" || path.startsWith("/filofax/")) return "/filofax";
      return "";
    })();

    function resolveUserId() {
      const params = new URLSearchParams(window.location.search || "");
      const raw = params.get("userid") || params.get("user_id") || params.get("userId") || "";
      const fromUrl = String(raw).trim();
      if (fromUrl) {
        try { sessionStorage.setItem("filofax_user_id", fromUrl); } catch (_) {}
        return fromUrl;
      }
      try {
        const saved = sessionStorage.getItem("filofax_user_id");
        if (saved && saved.trim()) return saved.trim();
      } catch (_) {}
      return "default";
    }

    function resolveTimezone() {
      const params = new URLSearchParams(window.location.search || "");
      const raw = params.get("timezone") || params.get("timeZone") || params.get("tz") || "";
      const fromUrl = String(raw).trim();
      if (fromUrl) {
        try { sessionStorage.setItem("filofax_timezone", fromUrl); } catch (_) {}
        return fromUrl;
      }
      try {
        const saved = sessionStorage.getItem("filofax_timezone");
        if (saved && saved.trim()) return saved.trim();
      } catch (_) {}
      try {
        return Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Vienna";
      } catch (_) {
        return "Europe/Vienna";
      }
    }

    const userId = resolveUserId();
    const timezone = resolveTimezone();
    let pendingEvent = null;
    let busy = false;       // waiting on API
    let speaking = false;   // TTS playing — can barge-in
    let ttsEnabled = true;
    let listening = false;
    let recognition = null;
    let bargeRecognition = null;
    let finalText = "";
    let interimText = "";
    let speakGeneration = 0;
    let bargeArmedAt = 0;

    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    const canSpeak = !!window.speechSynthesis;

    const statusEl = document.getElementById("status");
    const orb = document.getElementById("orb");
    const transcriptEl = document.getElementById("transcript");
    const chipsEl = document.getElementById("chips");
    const muteBtn = document.getElementById("muteBtn");
    const clearBtn = document.getElementById("clearBtn");
    const chatLink = document.getElementById("chatLink");
    const hintEl = document.getElementById("hint");

    chatLink.href = `${API || ""}/${window.location.search || ""}`;

    function setStatus(text, mode = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (mode ? " " + mode : "");
    }

    function setOrbMode(mode) {
      orb.classList.remove("listening", "thinking", "speaking");
      if (mode) orb.classList.add(mode);
    }

    function addLine(text, kind = "bot") {
      if (!text) return;
      const el = document.createElement("div");
      el.className = "line " + kind;
      el.textContent = text;
      transcriptEl.appendChild(el);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      return el;
    }

    function clearInterim() {
      [...transcriptEl.querySelectorAll(".interim")].forEach((n) => n.remove());
    }

    function showInterim(text) {
      clearInterim();
      if (!text) return;
      addLine(text, "interim");
    }

    function setChips(items, { confirm = false } = {}) {
      chipsEl.innerHTML = "";
      if (!items || !items.length) {
        chipsEl.hidden = true;
        return;
      }
      chipsEl.hidden = false;
      items.forEach((label) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip";
        const lower = String(label).toLowerCase();
        if (confirm && (lower.startsWith("yes") || lower.includes("save"))) btn.classList.add("yes");
        if (confirm && (lower === "no" || lower.startsWith("no,"))) btn.classList.add("no");
        btn.textContent = label;
        btn.addEventListener("click", () => {
          interruptSpeaking();
          sendChat(label, confirm && (lower.startsWith("yes") || lower.includes("save")));
        });
        chipsEl.appendChild(btn);
      });
    }

    function unlockAudio() {
      try {
        if (!canSpeak) return;
        const u = new SpeechSynthesisUtterance(" ");
        u.volume = 0;
        window.speechSynthesis.speak(u);
      } catch (_) {}
    }

    function stopBargeListener() {
      try { if (bargeRecognition) bargeRecognition.onresult = null; } catch (_) {}
      try { if (bargeRecognition) bargeRecognition.stop(); } catch (_) {}
      bargeRecognition = null;
    }

    /** Cancel TTS immediately — like ChatGPT voice barge-in. */
    function interruptSpeaking() {
      if (!speaking && !(canSpeak && window.speechSynthesis.speaking)) return false;
      speakGeneration += 1;
      speaking = false;
      stopBargeListener();
      try { window.speechSynthesis.cancel(); } catch (_) {}
      setOrbMode("");
      return true;
    }

    function startBargeListener() {
      if (!SpeechRecognitionAPI || !speaking) return;
      stopBargeListener();
      bargeArmedAt = Date.now() + 700; // ignore echo of our own TTS briefly
      try {
        bargeRecognition = new SpeechRecognitionAPI();
        bargeRecognition.continuous = true;
        bargeRecognition.interimResults = true;
        bargeRecognition.lang = "en-US";
        bargeRecognition.onresult = (event) => {
          if (!speaking) return;
          if (Date.now() < bargeArmedAt) return;
          let chunk = "";
          for (let i = event.resultIndex; i < event.results.length; i++) {
            chunk += event.results[i][0].transcript || "";
          }
          const text = chunk.trim();
          // Need a real utterance (avoid TTS echo/noise)
          if (text.length < 6 && text.split(/\s+/).filter(Boolean).length < 2) return;
          const kept = text;
          interruptSpeaking();
          finalText = kept;
          interimText = "";
          showInterim(kept);
          startListening({ seed: kept, fromBarge: true });
        };
        bargeRecognition.onerror = () => {};
        bargeRecognition.onend = () => {
          if (speaking) {
            try { bargeRecognition.start(); } catch (_) {}
          }
        };
        bargeRecognition.start();
      } catch (_) {
        bargeRecognition = null;
      }
    }

    function speak(text) {
      if (!ttsEnabled || !canSpeak || !text) {
        speaking = false;
        return Promise.resolve();
      }
      const gen = ++speakGeneration;
      return new Promise((resolve) => {
        try {
          try { window.speechSynthesis.cancel(); } catch (_) {}
          const u = new SpeechSynthesisUtterance(text);
          u.rate = 1.02;
          const finish = () => {
            if (gen !== speakGeneration) {
              resolve();
              return;
            }
            speaking = false;
            stopBargeListener();
            if (!listening && !busy) {
              setOrbMode("");
              setStatus("Tap to talk · interrupt anytime");
              hintEl.textContent = "You can interrupt while I'm speaking — tap the orb or just talk.";
            }
            resolve();
          };
          u.onend = finish;
          u.onerror = finish;
          speaking = true;
          setOrbMode("speaking");
          setStatus("Speaking… tap or talk to interrupt", "speak");
          hintEl.textContent = "Interrupt anytime — tap the orb or start talking.";
          window.speechSynthesis.speak(u);
          startBargeListener();
        } catch (_) {
          speaking = false;
          resolve();
        }
      });
    }

    async function sendChat(message, confirm = false) {
      const text = String(message || "").trim();
      if (!text || busy) return;
      busy = true;
      interruptSpeaking();
      stopListening(false);
      clearInterim();
      addLine(text, "user");
      setChips([]);
      setOrbMode("thinking");
      setStatus("Thinking…", "think");
      hintEl.textContent = "Working with the same Filofax assistant…";

      try {
        const body = {
          message: text,
          user_id: userId,
          timezone,
          confirm: Boolean(confirm),
        };
        if (pendingEvent) body.pending_event = pendingEvent;

        const res = await fetch(`${API}/api/assistant/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const raw = await res.text();
        let data = {};
        try { data = raw ? JSON.parse(raw) : {}; } catch (_) {
          throw new Error(raw.slice(0, 160) || res.statusText);
        }
        if (!res.ok) {
          throw new Error((data.error && data.error.message) || data.detail || raw.slice(0, 160) || res.statusText);
        }

        if (data.pending_event) pendingEvent = data.pending_event;
        if (data.event) pendingEvent = null;
        if (data.intent === "cancel_event") pendingEvent = null;

        const reply = data.message || "Okay.";
        addLine(reply, "bot");

        if (data.needs_confirmation) {
          setChips(data.suggested_replies || ["Yes, save", "No"], { confirm: true });
          hintEl.textContent = "Say yes to save, tap a chip, or interrupt and speak.";
        } else if (data.suggested_replies && data.suggested_replies.length) {
          setChips(data.suggested_replies);
          hintEl.textContent = "Tap a suggestion, or interrupt and speak.";
        } else {
          setChips([]);
        }

        busy = false;
        await speak(reply);
      } catch (err) {
        setStatus(String(err.message || err), "err");
        addLine("Sorry — " + (err.message || "request failed"), "meta");
        setOrbMode("");
      } finally {
        busy = false;
        if (!speaking && !listening) {
          setOrbMode("");
          setStatus("Tap to talk · interrupt anytime");
        }
      }
    }

    function stopListening(send = true) {
      listening = false;
      try { if (recognition) recognition.stop(); } catch (_) {}
      recognition = null;
      const text = (finalText + " " + interimText).replace(/\s+/g, " ").trim();
      finalText = "";
      interimText = "";
      clearInterim();
      if (send && text) sendChat(text);
      else if (!busy && !speaking) {
        setOrbMode("");
        setStatus("Tap to talk · interrupt anytime");
      }
    }

    function startListening({ seed = "", fromBarge = false } = {}) {
      if (!SpeechRecognitionAPI) {
        setStatus("Speech not supported — use Chrome/Edge, or open text chat", "err");
        return;
      }
      if (busy) return;

      interruptSpeaking();
      unlockAudio();
      stopBargeListener();

      finalText = seed || "";
      interimText = "";
      listening = true;
      setOrbMode("listening");
      setStatus(fromBarge ? "Interrupted — listening…" : "Listening…", "live");
      hintEl.textContent = "Tap the orb again when you're done.";
      if (finalText) showInterim(finalText);

      recognition = new SpeechRecognitionAPI();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = "en-US";

      recognition.onresult = (event) => {
        let interim = "";
        let finalized = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const r = event.results[i];
          if (r.isFinal) finalized += r[0].transcript;
          else interim += r[0].transcript;
        }
        if (finalized) finalText = (finalText + " " + finalized).trim();
        interimText = interim.trim();
        showInterim((finalText + " " + interimText).trim());
      };

      recognition.onerror = () => {
        if (listening) stopListening(true);
      };
      recognition.onend = () => {
        if (listening) {
          try { recognition.start(); } catch (_) { stopListening(true); }
        }
      };

      try {
        recognition.start();
      } catch (_) {
        listening = false;
        setStatus("Could not start microphone", "err");
        setOrbMode("");
      }
    }

    orb.addEventListener("click", () => {
      unlockAudio();
      // Barge-in: interrupt AI mid-sentence and start listening
      if (speaking || (canSpeak && window.speechSynthesis.speaking)) {
        interruptSpeaking();
        startListening({ fromBarge: true });
        return;
      }
      if (busy) return;
      if (listening) stopListening(true);
      else startListening();
    });

    muteBtn.addEventListener("click", () => {
      ttsEnabled = !ttsEnabled;
      muteBtn.textContent = ttsEnabled ? "🔊 Voice" : "🔇 Muted";
      muteBtn.classList.toggle("off", !ttsEnabled);
      if (!ttsEnabled) interruptSpeaking();
      unlockAudio();
    });

    clearBtn.addEventListener("click", async () => {
      unlockAudio();
      interruptSpeaking();
      stopListening(false);
      pendingEvent = null;
      transcriptEl.innerHTML = "";
      setChips([]);
      try {
        await fetch(`${API}/api/events?user_id=${encodeURIComponent(userId)}`, { method: "DELETE" });
      } catch (_) {}
      addLine("Cleared. Let's set up the event. What is the date and time?", "bot");
      setStatus("Tap to talk · interrupt anytime");
      setOrbMode("");
    });

    // Warm greeting (same opener as chat)
    addLine("Let's set up the event. What is the date and time for this event?", "bot");
    setStatus("Tap to talk · interrupt anytime");
    hintEl.textContent = "You can interrupt while I'm speaking — tap the orb or just talk.";
    setTimeout(() => {
      unlockAudio();
      speak("Let's set up the event. What is the date and time for this event?");
    }, 400);
  </script>
</body>
</html>
