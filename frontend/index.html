<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Filofax AI Event Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a2332;
      --muted: #5c6b7a;
      --paper: #f3efe6;
      --panel: rgba(255, 252, 246, 0.88);
      --line: rgba(26, 35, 50, 0.12);
      --accent: #0f6e56;
      --accent-soft: #d8efe6;
      --warn: #8a4b12;
      --danger: #8b2e2e;
      --shadow: 0 18px 50px rgba(26, 35, 50, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, #cfe8dc 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 0%, #e8dcc8 0%, transparent 50%),
        linear-gradient(165deg, #ebe4d6 0%, var(--paper) 45%, #e2ebe7 100%);
    }
    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      display: grid;
      gap: 1.25rem;
    }
    header h1 {
      font-family: "Fraunces", serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      color: var(--muted);
      max-width: 36rem;
      line-height: 1.5;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: 0.85rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #b45309;
    }
    .dot.ok { background: var(--accent); }
    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 1rem;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.1rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }
    .panel h2 {
      margin: 0;
      padding: 1rem 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-bottom: 1px solid var(--line);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .bubble {
      max-width: 92%;
      padding: 0.75rem 0.9rem;
      border-radius: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
      font-size: 0.95rem;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--accent);
      color: #f7fffb;
    }
    .bubble.bot {
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--line);
    }
    .bubble.meta {
      font-size: 0.8rem;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 0 0.2rem;
    }
    .composer {
      border-top: 1px solid var(--line);
      background: #e8e4dc;
      padding: 0.55rem 0.65rem;
    }
    .composer-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 3rem;
    }
    .composer-row[hidden] { display: none !important; }
    .composer-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 1.5rem;
      border: 1px solid rgba(26, 35, 50, 0.08);
      padding: 0.15rem 0.85rem;
      min-height: 2.65rem;
    }
    .composer-input-wrap input[type="text"] {
      flex: 1;
      border: 0;
      outline: none;
      padding: 0.55rem 0;
      font: inherit;
      background: transparent;
      min-width: 0;
    }
    .composer-input-wrap input::placeholder { color: #8a97a6; }
    .icon-btn {
      border: 0;
      width: 2.85rem;
      height: 2.85rem;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      font: inherit;
      transition: transform 0.12s ease, background 0.12s ease;
    }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn:disabled { opacity: 0.5; cursor: wait; }
    .icon-btn svg { width: 1.35rem; height: 1.35rem; display: block; }
    .icon-btn.mic {
      background: var(--accent);
      color: #fff;
    }
    .icon-btn.send {
      background: var(--accent);
      color: #fff;
    }
    .icon-btn.send[hidden],
    .icon-btn.mic[hidden] { display: none !important; }
    .icon-btn.stop-send {
      background: var(--accent);
      color: #fff;
    }
    .icon-btn.cancel-rec {
      background: transparent;
      color: var(--muted);
      width: 2.5rem;
      height: 2.5rem;
    }
    .icon-btn.cancel-rec:hover { color: var(--danger); }
    button.ghost {
      border: 0;
      border-radius: 0.75rem;
      padding: 0.65rem 1rem;
      font: inherit;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      cursor: pointer;
    }
    .rec-bar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      min-width: 0;
      padding: 0 0.25rem;
    }
    .rec-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      background: #e53935;
      flex-shrink: 0;
      animation: recBlink 1s ease-in-out infinite;
    }
    @keyframes recBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    .rec-timer {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--ink);
      min-width: 2.5rem;
    }
    .rec-wave {
      flex: 1;
      height: 1.75rem;
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      overflow: hidden;
    }
    .rec-wave span {
      width: 3px;
      border-radius: 2px;
      background: #25d366;
      animation: wave 0.9s ease-in-out infinite;
    }
    .rec-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .rec-wave span:nth-child(2) { height: 16px; animation-delay: 0.1s; }
    .rec-wave span:nth-child(3) { height: 11px; animation-delay: 0.2s; }
    .rec-wave span:nth-child(4) { height: 20px; animation-delay: 0.15s; }
    .rec-wave span:nth-child(5) { height: 9px; animation-delay: 0.25s; }
    .rec-wave span:nth-child(6) { height: 15px; animation-delay: 0.05s; }
    .rec-wave span:nth-child(7) { height: 18px; animation-delay: 0.18s; }
    .rec-wave span:nth-child(8) { height: 10px; animation-delay: 0.3s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.55); opacity: 0.55; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    .rec-hint {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }
    @media (max-width: 520px) {
      .rec-hint { display: none; }
    }
    .bubble.voice {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .bubble.voice::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #25d366;
      flex-shrink: 0;
    }
    .bubble.typing {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 3.5rem;
      padding: 0.85rem 1rem;
    }
    .bubble.typing .dot {
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 50%;
      background: var(--muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .bubble.typing .dot:nth-child(2) { animation-delay: 0.15s; }
    .bubble.typing .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .bubble.typing .typing-label {
      margin-left: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    #events {
      padding: 0.75rem 1rem 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .event {
      padding: 0.75rem 0.85rem;
      border-radius: 0.8rem;
      background: #fff;
      border: 1px solid var(--line);
    }
    .event strong { display: block; margin-bottom: 0.2rem; }
    .event span { color: var(--muted); font-size: 0.85rem; }
    .empty { color: var(--muted); font-size: 0.9rem; padding: 0.5rem; }
    .actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.9rem 0.9rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Filofax</h1>
      <p>Text ya voice note se events create/search karein. Voice server pe local Whisper se process hoti hai.</p>
      <div class="status"><span class="dot" id="dot"></span><span id="health">Checking AI runtime…</span></div>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>Assistant</h2>
        <div id="log"></div>
        <div class="actions" id="confirmBar" hidden>
          <button type="button" class="ghost" id="cancelBtn">Cancel draft</button>
        </div>
        <form id="chatForm" class="composer" autocomplete="off">
          <div class="composer-row" id="textRow">
            <div class="composer-input-wrap">
              <input id="message" type="text" placeholder="Message" autocomplete="off" />
            </div>
            <button type="button" class="icon-btn mic" id="micBtn" title="Voice note" aria-label="Voice note">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
            </button>
            <button type="submit" class="icon-btn send" id="sendBtn" title="Send" aria-label="Send" hidden>
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
          <div class="composer-row" id="recRow" hidden>
            <button type="button" class="icon-btn cancel-rec" id="cancelRecBtn" title="Cancel" aria-label="Cancel recording">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
            <div class="rec-bar">
              <span class="rec-dot" aria-hidden="true"></span>
              <span class="rec-timer" id="recTimer">0:00</span>
              <div class="rec-wave" aria-hidden="true">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
              </div>
              <span class="rec-hint">Enter / stop to send</span>
            </div>
            <button type="button" class="icon-btn stop-send" id="stopRecBtn" title="Send voice note" aria-label="Send voice note">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Your events</h2>
        <div id="events"><div class="empty">No events yet.</div></div>
      </section>
    </div>
  </div>

  <script>
    const API = (() => {
      const path = window.location.pathname || "";
      if (path === "/filofax" || path.startsWith("/filofax/")) return "/filofax";
      return "";
    })();
    const userId = "default";
    let pendingEvent = null;

    const logEl = document.getElementById("log");
    const eventsEl = document.getElementById("events");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const textRow = document.getElementById("textRow");
    const recRow = document.getElementById("recRow");
    const recTimerEl = document.getElementById("recTimer");
    const stopRecBtn = document.getElementById("stopRecBtn");
    const cancelRecBtn = document.getElementById("cancelRecBtn");
    const confirmBar = document.getElementById("confirmBar");
    const cancelBtn = document.getElementById("cancelBtn");
    const healthEl = document.getElementById("health");
    const dot = document.getElementById("dot");

    let mediaRecorder = null;
    let mediaStream = null;
    let audioChunks = [];
    let isRecording = false;
    let discardRecording = false;
    let recStartedAt = 0;
    let recTimerId = null;

    function syncComposerButtons() {
      const hasText = input.value.trim().length > 0;
      micBtn.hidden = hasText;
      sendBtn.hidden = !hasText;
    }

    function formatRecTime(ms) {
      const sec = Math.floor(ms / 1000);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function showRecordingUi() {
      textRow.hidden = true;
      recRow.hidden = false;
      recStartedAt = Date.now();
      recTimerEl.textContent = "0:00";
      clearInterval(recTimerId);
      recTimerId = setInterval(() => {
        recTimerEl.textContent = formatRecTime(Date.now() - recStartedAt);
      }, 250);
    }

    function hideRecordingUi() {
      clearInterval(recTimerId);
      recTimerId = null;
      recRow.hidden = true;
      textRow.hidden = false;
      syncComposerButtons();
      input.focus();
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      micBtn.disabled = busy;
      stopRecBtn.disabled = busy;
      cancelRecBtn.disabled = busy;
      input.disabled = busy;
    }

    function addBubble(text, who, extraClass = "") {
      const div = document.createElement("div");
      div.className = `bubble ${who}${extraClass ? " " + extraClass : ""}`;
      div.textContent = text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      return div;
    }

    function showTyping(label = "Processing…") {
      const div = document.createElement("div");
      div.className = "bubble bot typing";
      div.id = "typingIndicator";
      div.innerHTML = `<span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="typing-label">${escapeHtml(label)}</span>`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      return div;
    }

    function hideTyping() {
      document.getElementById("typingIndicator")?.remove();
    }

    function setPending(event) {
      pendingEvent = event;
      confirmBar.hidden = !event;
    }

    function applyAssistantResult(data) {
      addBubble(data.message || JSON.stringify(data), "bot");
      if (data.event) {
        setPending(null);
        return refreshEvents();
      }
      if (data.intent === "search_events") {
        if (data.events?.length) {
          addBubble(data.events.map((e) =>
            `• ${e.label} — ${e.event_date}${e.event_time ? " " + String(e.event_time).slice(0,5) : ""} (${e.category})`
          ).join("\n"), "bot");
        }
      } else if (data.intent === "cancel_event") {
        setPending(null);
      } else if (data.pending_event) {
        setPending(data.pending_event);
      } else if (data.missing_fields?.length) {
        setPending(data.pending_event || pendingEvent);
      }
      return Promise.resolve();
    }

    async function refreshEvents() {
      const res = await fetch(`${API}/api/events?user_id=${encodeURIComponent(userId)}`);
      const data = await res.json();
      if (!data.length) {
        eventsEl.innerHTML = '<div class="empty">No events yet.</div>';
        return;
      }
      eventsEl.innerHTML = data.map((e) => `
        <div class="event">
          <strong>${escapeHtml(e.label)}</strong>
          <span>${e.event_date}${e.event_time ? " · " + String(e.event_time).slice(0,5) : ""} · ${escapeHtml(e.category)}</span>
        </div>
      `).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    async function chat(message, confirm = false) {
      setBusy(true);
      showTyping("Thinking…");
      try {
        const body = {
          message,
          user_id: userId,
          confirm: Boolean(confirm),
        };
        if (pendingEvent) body.pending_event = pendingEvent;

        const res = await fetch(`${API}/api/assistant/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        hideTyping();
        await applyAssistantResult(data);
      } catch (err) {
        hideTyping();
        addBubble("Request failed: " + err.message, "bot");
      } finally {
        setBusy(false);
      }
    }

    async function sendVoice(blob) {
      setBusy(true);
      showTyping("Listening / transcribing…");
      try {
        const formData = new FormData();
        formData.append("audio", blob, "note.webm");
        formData.append("user_id", userId);
        formData.append("confirm", "false");
        if (pendingEvent) {
          formData.append("pending_event", JSON.stringify(pendingEvent));
        }
        const res = await fetch(`${API}/api/assistant/voice`, {
          method: "POST",
          body: formData,
        });
        const data = await res.json().catch(() => ({}));
        hideTyping();
        if (!res.ok) {
          addBubble(data.detail || "Voice processing failed.", "bot");
          return;
        }
        if (data.transcript) {
          addBubble(data.transcript, "user", "voice");
        }
        await applyAssistantResult(data);
      } catch (err) {
        hideTyping();
        addBubble("Voice request failed: " + err.message, "bot");
      } finally {
        setBusy(false);
      }
    }

    async function startRecording() {
      if (!navigator.mediaDevices?.getUserMedia) {
        addBubble("Microphone not supported in this browser.", "bot");
        return;
      }
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        discardRecording = false;
        const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
          ? "audio/webm;codecs=opus"
          : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
        mediaRecorder = mime
          ? new MediaRecorder(mediaStream, { mimeType: mime })
          : new MediaRecorder(mediaStream);
        mediaRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
          mediaStream?.getTracks().forEach((t) => t.stop());
          mediaStream = null;
          hideRecordingUi();
          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
          audioChunks = [];
          if (discardRecording) {
            discardRecording = false;
            return;
          }
          if (blob.size < 200) {
            addBubble("Voice note too short. Try again.", "bot");
            return;
          }
          await sendVoice(blob);
        };
        mediaRecorder.start();
        isRecording = true;
        showRecordingUi();
      } catch (err) {
        addBubble("Microphone permission denied or unavailable.", "bot");
      }
    }

    function stopRecording({ discard = false } = {}) {
      if (!mediaRecorder || mediaRecorder.state === "inactive") return;
      discardRecording = discard;
      isRecording = false;
      mediaRecorder.stop();
    }

    micBtn.addEventListener("click", async () => {
      if (!isRecording) await startRecording();
    });

    stopRecBtn.addEventListener("click", () => stopRecording());
    cancelRecBtn.addEventListener("click", () => stopRecording({ discard: true }));

    input.addEventListener("input", syncComposerButtons);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (isRecording) {
        stopRecording();
        return;
      }
      const text = input.value.trim();
      if (!text) return;
      addBubble(text, "user");
      input.value = "";
      syncComposerButtons();
      await chat(text, false);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && isRecording) {
        e.preventDefault();
        stopRecording();
      }
      if (e.key === "Escape" && isRecording) {
        e.preventDefault();
        stopRecording({ discard: true });
      }
    });

    cancelBtn.addEventListener("click", async () => {
      if (!pendingEvent) return;
      addBubble("cancel", "user");
      await chat("cancel", false);
    });

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/api/health`);
        const data = await res.json();
        const runtime = data.ai || data.ollama || {};
        const ollamaOk = runtime.ok && runtime.model_available;
        const voice = data.voice || {};
        dot.classList.toggle("ok", !!ollamaOk);
        const model = data.ai_model || data.model;
        let label = ollamaOk
          ? `Ready · ${data.ai_provider || "ollama"} · ${model}`
          : `API up · AI: ${runtime.error || "model not found — run ollama pull " + model}`;
        if (voice.enabled) {
          label += voice.ok ? ` · Voice: ${voice.model || "whisper"}` : " · Voice: setup needed";
        }
        healthEl.textContent = label;
      } catch {
        healthEl.textContent = "API unreachable";
      }
    }

    syncComposerButtons();
    addBubble("Text ya voice note: date → time → category → label. Missing clear hone tak poochta rahega.", "bot");
    checkHealth();
    refreshEvents();
  </script>
</body>
</html>
