<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Filofax AI Event Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a2332;
      --muted: #5c6b7a;
      --paper: #f3efe6;
      --panel: rgba(255, 252, 246, 0.88);
      --line: rgba(26, 35, 50, 0.12);
      --accent: #0f6e56;
      --accent-soft: #d8efe6;
      --warn: #8a4b12;
      --danger: #8b2e2e;
      --shadow: 0 18px 50px rgba(26, 35, 50, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, #cfe8dc 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 0%, #e8dcc8 0%, transparent 50%),
        linear-gradient(165deg, #ebe4d6 0%, var(--paper) 45%, #e2ebe7 100%);
    }
    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      display: grid;
      gap: 1.25rem;
    }
    header h1 {
      font-family: "Fraunces", serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      color: var(--muted);
      max-width: 36rem;
      line-height: 1.5;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: 0.85rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #b45309;
    }
    .dot.ok { background: var(--accent); }
    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 1rem;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.1rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }
    .panel h2 {
      margin: 0;
      padding: 1rem 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-bottom: 1px solid var(--line);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .bubble {
      max-width: 92%;
      padding: 0.75rem 0.9rem;
      border-radius: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
      font-size: 0.95rem;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--accent);
      color: #f7fffb;
    }
    .bubble.bot {
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--line);
    }
    .bubble.meta {
      font-size: 0.8rem;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 0 0.2rem;
    }
    form {
      display: flex;
      gap: 0.5rem;
      padding: 0.9rem;
      border-top: 1px solid var(--line);
    }
    input[type="text"] {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 0.75rem;
      padding: 0.75rem 0.9rem;
      font: inherit;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      font: inherit;
      font-weight: 600;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: wait; }
    button.ghost {
      background: var(--accent-soft);
      color: var(--accent);
    }
    #events {
      padding: 0.75rem 1rem 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .event {
      padding: 0.75rem 0.85rem;
      border-radius: 0.8rem;
      background: #fff;
      border: 1px solid var(--line);
    }
    .event strong { display: block; margin-bottom: 0.2rem; }
    .event span { color: var(--muted); font-size: 0.85rem; }
    .empty { color: var(--muted); font-size: 0.9rem; padding: 0.5rem; }
    .actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.9rem 0.9rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Filofax</h1>
      <p>Create and search events in any language the local model understands — English, Urdu, Hindi, Spanish, Chinese, mixed text, and more. Nothing is written until you confirm.</p>
      <div class="status"><span class="dot" id="dot"></span><span id="health">Checking AI runtime…</span></div>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>Assistant</h2>
        <div id="log"></div>
        <div class="actions" id="confirmBar" hidden>
          <button type="button" id="cancelBtn">Cancel draft</button>
        </div>
        <form id="chatForm">
          <input id="message" type="text" placeholder="e.g. Kal 4 baje meeting add kar do · Mañana a las 4 · 明天下午四点" autocomplete="off" required />
          <button type="submit" id="sendBtn">Send</button>
        </form>
      </section>

      <section class="panel">
        <h2>Your events</h2>
        <div id="events"><div class="empty">No events yet.</div></div>
      </section>
    </div>
  </div>

  <script>
    const API = (() => {
      const path = window.location.pathname || "";
      if (path === "/filofax" || path.startsWith("/filofax/")) return "/filofax";
      return "";
    })();
    const userId = "default";
    let pendingEvent = null;

    const logEl = document.getElementById("log");
    const eventsEl = document.getElementById("events");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const confirmBar = document.getElementById("confirmBar");
    const cancelBtn = document.getElementById("cancelBtn");
    const healthEl = document.getElementById("health");
    const dot = document.getElementById("dot");

    function addBubble(text, who) {
      const div = document.createElement("div");
      div.className = `bubble ${who}`;
      div.textContent = text;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setPending(event) {
      pendingEvent = event;
      confirmBar.hidden = !event;
    }

    async function refreshEvents() {
      const res = await fetch(`${API}/api/events?user_id=${encodeURIComponent(userId)}`);
      const data = await res.json();
      if (!data.length) {
        eventsEl.innerHTML = '<div class="empty">No events yet.</div>';
        return;
      }
      eventsEl.innerHTML = data.map((e) => `
        <div class="event">
          <strong>${escapeHtml(e.label)}</strong>
          <span>${e.event_date}${e.event_time ? " · " + String(e.event_time).slice(0,5) : ""} · ${escapeHtml(e.category)}</span>
        </div>
      `).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    async function chat(message, confirm = false) {
      sendBtn.disabled = true;
      try {
        const body = {
          message,
          user_id: userId,
          confirm: Boolean(confirm),
        };
        if (pendingEvent) body.pending_event = pendingEvent;

        const res = await fetch(`${API}/api/assistant/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        addBubble(data.message || JSON.stringify(data), "bot");
        if (data.event) {
          setPending(null);
          await refreshEvents();
        } else if (data.intent === "search_events") {
          if (data.events?.length) {
            addBubble(data.events.map((e) =>
              `• ${e.label} — ${e.event_date}${e.event_time ? " " + String(e.event_time).slice(0,5) : ""} (${e.category})`
            ).join("\n"), "bot");
          }
        } else if (data.intent === "cancel_event") {
          setPending(null);
        } else if (data.pending_event) {
          setPending(data.pending_event);
        } else if (data.missing_fields?.length) {
          setPending(data.pending_event || pendingEvent);
        }
      } catch (err) {
        addBubble("Request failed: " + err.message, "bot");
      } finally {
        sendBtn.disabled = false;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addBubble(text, "user");
      input.value = "";
      await chat(text, false);
    });

    cancelBtn.addEventListener("click", async () => {
      if (!pendingEvent) return;
      addBubble("cancel", "user");
      await chat("cancel", false);
    });

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/api/health`);
        const data = await res.json();
        const runtime = data.ai || data.ollama || {};
        const ollamaOk = runtime.ok && runtime.model_available;
        dot.classList.toggle("ok", !!ollamaOk);
        const model = data.ai_model || data.model;
        healthEl.textContent = ollamaOk
          ? `Ready · ${data.ai_provider || "ollama"} · ${model}`
          : `API up · AI: ${runtime.error || "model not found — run ollama pull " + model}`;
      } catch {
        healthEl.textContent = "API unreachable";
      }
    }

    addBubble("Create: date → time → category → label (or all in one message). Search anytime. Complete events save automatically.", "bot");
    checkHealth();
    refreshEvents();
  </script>
</body>
</html>
