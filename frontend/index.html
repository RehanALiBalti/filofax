<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Filofax AI Event Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a2332;
      --muted: #5c6b7a;
      --paper: #f3efe6;
      --panel: rgba(255, 252, 246, 0.88);
      --line: rgba(26, 35, 50, 0.12);
      --accent: #0f6e56;
      --accent-soft: #d8efe6;
      --warn: #8a4b12;
      --danger: #8b2e2e;
      --shadow: 0 18px 50px rgba(26, 35, 50, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, #cfe8dc 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 0%, #e8dcc8 0%, transparent 50%),
        linear-gradient(165deg, #ebe4d6 0%, var(--paper) 45%, #e2ebe7 100%);
    }
    .shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      display: grid;
      gap: 1.25rem;
    }
    header h1 {
      font-family: "Fraunces", serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      color: var(--muted);
      max-width: 36rem;
      line-height: 1.5;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: 0.85rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #b45309;
    }
    .dot.ok { background: var(--accent); }
    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 1rem;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.1rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }
    .panel h2 {
      margin: 0;
      padding: 1rem 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-bottom: 1px solid var(--line);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .bubble {
      max-width: 92%;
      padding: 0.75rem 0.9rem;
      border-radius: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
      font-size: 0.95rem;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--accent);
      color: #f7fffb;
    }
    .bubble.bot {
      align-self: flex-start;
      background: #fff;
      border: 1px solid var(--line);
    }
    .bubble.bot.has-play {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      padding-right: 0.55rem;
    }
    .bubble-text {
      flex: 1;
      min-width: 0;
    }
    .bubble-play {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      border: 0;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      line-height: 1;
      margin-top: 0.1rem;
      transition: background 0.15s ease, transform 0.12s ease;
    }
    .bubble-play:hover { background: #c5e6d9; }
    .bubble-play:active { transform: scale(0.92); }
    .bubble-play.playing {
      background: var(--accent);
      color: #fff;
      animation: playPulse 1s ease-in-out infinite;
    }
    @keyframes playPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .bubble.meta {
      font-size: 0.8rem;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 0 0.2rem;
    }
    .composer {
      border-top: 1px solid var(--line);
      background: #e8e4dc;
      padding: 0.55rem 0.65rem;
    }
    .composer-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 3rem;
    }
    .composer-row[hidden] { display: none !important; }
    .composer-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 1.5rem;
      border: 1px solid rgba(26, 35, 50, 0.08);
      padding: 0.15rem 0.85rem;
      min-height: 2.65rem;
    }
    .composer-input-wrap input[type="text"] {
      flex: 1;
      border: 0;
      outline: none;
      padding: 0.55rem 0;
      font: inherit;
      background: transparent;
      min-width: 0;
    }
    .composer-input-wrap input::placeholder { color: #8a97a6; }
    .confirm-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0.45rem 0.85rem 0.15rem;
      flex-wrap: wrap;
    }
    .confirm-actions[hidden] { display: none !important; }
    .confirm-actions button {
      border: 0;
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .confirm-actions .yes {
      background: var(--ink, #1a2332);
      color: #fff;
    }
    .confirm-actions .no {
      background: #fff;
      color: var(--ink, #1a2332);
      border: 1px solid rgba(26, 35, 50, 0.15);
    }
    .slot-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem 0.2rem;
    }
    .slot-chips[hidden] { display: none !important; }
    .slot-chips button {
      border: 1px solid rgba(26, 35, 50, 0.14);
      background: #fff;
      color: var(--ink, #1a2332);
      border-radius: 0.55rem;
      padding: 0.38rem 0.75rem;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .slot-chips button:hover {
      background: #f3f0ea;
      border-color: rgba(26, 35, 50, 0.28);
    }
    .icon-btn {
      border: 0;
      width: 2.85rem;
      height: 2.85rem;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      font: inherit;
      transition: transform 0.12s ease, background 0.12s ease;
    }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn:disabled { opacity: 0.5; cursor: wait; }
    .icon-btn svg { width: 1.35rem; height: 1.35rem; display: block; }
    .icon-btn.mic {
      background: var(--accent);
      color: #fff;
    }
    .icon-btn.send {
      background: var(--accent);
      color: #fff;
    }
    .icon-btn.send[hidden],
    .icon-btn.mic[hidden] { display: none !important; }
    .icon-btn.stop-send {
      background: var(--accent);
      color: #fff;
    }
    .icon-btn.cancel-rec {
      background: transparent;
      color: var(--muted);
      width: 2.5rem;
      height: 2.5rem;
    }
    .icon-btn.cancel-rec:hover { color: var(--danger); }
    button.ghost {
      border: 0;
      border-radius: 0.75rem;
      padding: 0.65rem 1rem;
      font: inherit;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      cursor: pointer;
    }
    .rec-bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.2rem;
      min-width: 0;
      padding: 0 0.25rem;
    }
    .rec-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .rec-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      background: #e53935;
      flex-shrink: 0;
      animation: recBlink 1s ease-in-out infinite;
    }
    @keyframes recBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    .rec-timer {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--muted);
      min-width: 2.5rem;
    }
    .rec-live {
      font-size: 0.92rem;
      line-height: 1.35;
      color: var(--ink);
      max-height: 2.7rem;
      overflow-y: auto;
      word-break: break-word;
      min-height: 1.2rem;
    }
    .rec-live .interim { color: var(--muted); }
    .rec-live:empty::before {
      content: "Listening… speak now";
      color: var(--muted);
      font-style: italic;
    }
    .rec-live.has-text:empty::before { content: none; }
    .bubble.voice {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .bubble.voice::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #25d366;
      flex-shrink: 0;
    }
    .bubble.typing {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 3.5rem;
      padding: 0.85rem 1rem;
    }
    .bubble.typing .dot {
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 50%;
      background: var(--muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .bubble.typing .dot:nth-child(2) { animation-delay: 0.15s; }
    .bubble.typing .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .bubble.typing .typing-label {
      margin-left: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    #events {
      padding: 0.75rem 1rem 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .event {
      padding: 0.75rem 0.85rem;
      border-radius: 0.8rem;
      background: #fff;
      border: 1px solid var(--line);
    }
    .event strong { display: block; margin-bottom: 0.2rem; }
    .event span { color: var(--muted); font-size: 0.85rem; }
    .empty { color: var(--muted); font-size: 0.9rem; padding: 0.5rem; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--line);
    }
    .panel-head h2 {
      margin: 0;
      padding: 0;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    button.clear-reminder {
      border: 1px solid rgba(139, 46, 46, 0.35);
      border-radius: 999px;
      padding: 0.4rem 0.85rem;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      background: #f8eaea;
      color: var(--danger);
      cursor: pointer;
      white-space: nowrap;
    }
    button.clear-reminder:hover:not(:disabled) {
      background: #f0d4d4;
    }
    button.clear-reminder:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .panel-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    button.tts-toggle {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      cursor: pointer;
      white-space: nowrap;
    }
    button.tts-toggle.off {
      background: #eee;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.9rem 0.9rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>Filofax</h1>
      <p>Bolte hi live transcript — stop dabate hi message chala jata hai (Chrome/Edge best).</p>
      <div class="status"><span class="dot" id="dot"></span><span id="health">Checking AI runtime…</span></div>
    </header>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>Assistant</h2>
          <div class="panel-actions">
            <button type="button" class="tts-toggle" id="ttsBtn" title="Toggle voice replies">🔊 Voice on</button>
            <button type="button" class="clear-reminder" id="clearBtn" title="Clear chat and delete all saved reminders">
              Clear chat
            </button>
          </div>
        </div>
        <div id="log"></div>
        <form id="chatForm" class="composer" autocomplete="off">
          <div class="confirm-actions" id="confirmActions" hidden>
            <button type="button" class="yes" id="confirmYes">Yes, save</button>
            <button type="button" class="no" id="confirmNo">No</button>
          </div>
          <div class="slot-chips" id="slotChips" hidden></div>
          <div class="composer-row" id="textRow">
            <div class="composer-input-wrap">
              <input id="message" type="text" placeholder="Message" autocomplete="off" />
            </div>
            <button type="button" class="icon-btn mic" id="micBtn" title="Voice note" aria-label="Voice note">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
            </button>
            <button type="submit" class="icon-btn send" id="sendBtn" title="Send" aria-label="Send" hidden>
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
          <div class="composer-row" id="recRow" hidden>
            <button type="button" class="icon-btn cancel-rec" id="cancelRecBtn" title="Cancel" aria-label="Cancel recording">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
            <div class="rec-bar">
              <div class="rec-meta">
                <span class="rec-dot" aria-hidden="true"></span>
                <span class="rec-timer" id="recTimer">0:00</span>
              </div>
              <div class="rec-live" id="recLive" aria-live="polite"></div>
            </div>
            <button type="button" class="icon-btn stop-send" id="stopRecBtn" title="Send" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Your events</h2>
        <div id="events"><div class="empty">No events yet.</div></div>
      </section>
    </div>
  </div>

  <script>
    const API = (() => {
      const path = window.location.pathname || "";
      if (path === "/filofax" || path.startsWith("/filofax/")) return "/filofax";
      return "";
    })();
    const userId = "default";
    let pendingEvent = null;

    const logEl = document.getElementById("log");
    const eventsEl = document.getElementById("events");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const textRow = document.getElementById("textRow");
    const recRow = document.getElementById("recRow");
    const recTimerEl = document.getElementById("recTimer");
    const recLiveEl = document.getElementById("recLive");
    const stopRecBtn = document.getElementById("stopRecBtn");
    const cancelRecBtn = document.getElementById("cancelRecBtn");
    const clearBtn = document.getElementById("clearBtn");
    const ttsBtn = document.getElementById("ttsBtn");
    const confirmActions = document.getElementById("confirmActions");
    const confirmYes = document.getElementById("confirmYes");
    const confirmNo = document.getElementById("confirmNo");
    const slotChips = document.getElementById("slotChips");
    const healthEl = document.getElementById("health");
    const dot = document.getElementById("dot");

    const PLACEHOLDERS = {
      date: "e.g. 14 August 2027",
      time: "e.g. 9:25 pm",
      category: "To Do · Appointment · Important",
      label: "e.g. Card Check",
      default: "Message",
    };

    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    const canSpeak = !!window.speechSynthesis;

    let mediaRecorder = null;
    let mediaStream = null;
    let audioChunks = [];
    let isRecording = false;
    let discardRecording = false;
    let recStartedAt = 0;
    let recTimerId = null;
    let recognition = null;
    let liveFinal = "";
    let liveInterim = "";
    let useLiveSpeech = false;
    let ttsEnabled = true;
    let welcomeSpoken = false;
    let welcomeUnlockBound = false;

    const WELCOME_VARIANTS = [
      "Hey! I'm Filofax — doing great over here. Want to add a reminder?",
      "Hi! Hope you're well. I can help you set a reminder whenever you're ready.",
      "Hello! I'm fine, thanks. Shall we create a reminder together?",
      "Hey there! Nice to see you. Want me to add a reminder for you?",
    ];
    const WELCOME_MSG = WELCOME_VARIANTS[Math.floor(Math.random() * WELCOME_VARIANTS.length)];

    function loadVoices() {
      if (!canSpeak) return [];
      return window.speechSynthesis.getVoices() || [];
    }

    // Prefer natural female voices (Neural / Online / known female names)
    const FEMALE_NAME_RE =
      /female|zira|samantha|karen|moira|fiona|tessa|victoria|susan|hazel|catherine|serena|aria|jenny|sonia|natasha|neerja|heera|google us english|microsoft aria|microsoft jenny|microsoft zira|Samantha|Karen/i;
    const MALE_NAME_RE =
      /male|\bdavid\b|\bmark\b|\bravi\b|\brichard\b|\bgeorge\b|\bfred\b|\balex\b|\bdaniel\b|\bbrian\b|\bthomas\b|microsoft david|microsoft mark|google uk english male/i;
    const QUALITY_RE = /neural|natural|online|premium|enhanced|wavenet|studio|google|microsoft.*online/i;

    function scoreVoice(v, lang, primary) {
      const name = v.name || "";
      const vLang = (v.lang || "").toLowerCase();
      let score = 0;

      if (MALE_NAME_RE.test(name) && !/female/i.test(name)) score -= 100;
      if (FEMALE_NAME_RE.test(name)) score += 80;
      // localService false often = cloud/neural higher quality on Chromium
      if (v.localService === false) score += 40;
      if (QUALITY_RE.test(name)) score += 50;
      if (vLang === lang) score += 30;
      else if (vLang.startsWith(primary)) score += 20;
      else if (/^en[-_]/.test(vLang) || vLang === "en") score += 15;
      else score -= 20;
      // Prefer en-US / en-GB natural assistants
      if (/en[-_]?us/i.test(vLang)) score += 10;
      if (/en[-_]?gb/i.test(vLang) && FEMALE_NAME_RE.test(name)) score += 8;
      return score;
    }

    function pickVoice() {
      const voices = loadVoices();
      if (!voices.length) return null;
      const lang = (navigator.language || "en-US").toLowerCase();
      const primary = lang.split("-")[0];

      const ranked = voices
        .map((v) => ({ v, score: scoreVoice(v, lang, primary) }))
        .sort((a, b) => b.score - a.score);

      // Best female / high-quality pick
      const best = ranked[0]?.v || null;
      if (best && scoreVoice(best, lang, primary) > 0) return best;

      // Fallback: any English voice that doesn't look male
      return (
        voices.find((v) => /en/i.test(v.lang) && !MALE_NAME_RE.test(v.name)) ||
        voices.find((v) => FEMALE_NAME_RE.test(v.name)) ||
        voices.find((v) => /en/i.test(v.lang)) ||
        voices[0]
      );
    }

    let cachedVoice = null;
    function getAssistantVoice() {
      const voices = loadVoices();
      if (!voices.length) return null;
      if (cachedVoice && voices.includes(cachedVoice)) return cachedVoice;
      cachedVoice = pickVoice();
      return cachedVoice;
    }

    let speakTimer = null;
    let keepAliveTimer = null;
    let activePlayBtn = null;

    function stopSpeaking() {
      if (!canSpeak) return;
      if (speakTimer) {
        clearTimeout(speakTimer);
        speakTimer = null;
      }
      if (keepAliveTimer) {
        clearInterval(keepAliveTimer);
        keepAliveTimer = null;
      }
      if (activePlayBtn) {
        activePlayBtn.classList.remove("playing");
        activePlayBtn = null;
      }
      try {
        window.speechSynthesis.cancel();
      } catch (_) { /* ignore */ }
    }

    function speakText(text, { isWelcome = false, force = false, playBtn = null } = {}) {
      if ((!ttsEnabled && !force) || !canSpeak || !text) return;
      const clean = String(text).replace(/\s+/g, " ").trim();
      if (!clean) return;

      const start = () => {
        stopSpeaking();
        // Chrome: cancel() then immediate speak often fails — small delay
        speakTimer = setTimeout(() => {
          try {
            window.speechSynthesis.resume();
          } catch (_) { /* ignore */ }

          const utter = new SpeechSynthesisUtterance(clean);
          const voice = getAssistantVoice();
          if (voice) {
            utter.voice = voice;
            utter.lang = voice.lang || "en-US";
          } else {
            utter.lang = "en-US";
          }
          // Clear, natural female-assistant delivery
          utter.rate = 0.95;
          utter.pitch = 1.08;
          utter.volume = 1;

          if (playBtn) {
            activePlayBtn = playBtn;
            playBtn.classList.add("playing");
          }

          utter.onstart = () => {
            if (isWelcome) welcomeSpoken = true;
          };

          // Chrome long-utterance freeze workaround
          keepAliveTimer = setInterval(() => {
            try {
              if (!window.speechSynthesis.speaking) {
                clearInterval(keepAliveTimer);
                keepAliveTimer = null;
                return;
              }
              window.speechSynthesis.resume();
            } catch (_) {
              clearInterval(keepAliveTimer);
              keepAliveTimer = null;
            }
          }, 8000);

          const done = () => {
            if (keepAliveTimer) {
              clearInterval(keepAliveTimer);
              keepAliveTimer = null;
            }
            if (playBtn) playBtn.classList.remove("playing");
            if (activePlayBtn === playBtn) activePlayBtn = null;
          };
          utter.onend = done;
          utter.onerror = () => {
            done();
            if (isWelcome) welcomeSpoken = false;
          };

          window.speechSynthesis.speak(utter);
        }, 60);
      };

      if (!loadVoices().length) {
        const once = () => {
          window.speechSynthesis.removeEventListener("voiceschanged", once);
          start();
        };
        window.speechSynthesis.addEventListener("voiceschanged", once);
        setTimeout(start, 500);
        return;
      }
      start();
    }

    let welcomeBubbleEl = null;

    function tryWelcomeSpeak() {
      if (welcomeSpoken || !ttsEnabled) return;
      const btn = welcomeBubbleEl?.querySelector(".bubble-play") || null;
      speakText(WELCOME_MSG, { isWelcome: true, playBtn: btn });
    }

    function bindWelcomeUnlock() {
      if (welcomeUnlockBound) return;
      welcomeUnlockBound = true;
      const unlock = () => {
        if (!welcomeSpoken) tryWelcomeSpeak();
        window.removeEventListener("pointerdown", unlock);
        window.removeEventListener("keydown", unlock);
        window.removeEventListener("touchstart", unlock);
      };
      window.addEventListener("pointerdown", unlock);
      window.addEventListener("keydown", unlock);
      window.addEventListener("touchstart", unlock);
    }

    function syncTtsButton() {
      if (!ttsBtn) return;
      ttsBtn.textContent = ttsEnabled ? "🔊 Voice on" : "🔇 Voice off";
      ttsBtn.classList.toggle("off", !ttsEnabled);
    }

    if (canSpeak) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = () => {
        cachedVoice = null;
        getAssistantVoice();
      };
      setTimeout(() => {
        cachedVoice = null;
        getAssistantVoice();
      }, 300);
    }

    if (ttsBtn) {
      ttsBtn.addEventListener("click", () => {
        ttsEnabled = !ttsEnabled;
        if (!ttsEnabled) {
          stopSpeaking();
        } else if (!welcomeSpoken) {
          tryWelcomeSpeak();
        } else {
          speakText("Voice replies on.");
        }
        syncTtsButton();
      });
      syncTtsButton();
    }

    function syncComposerButtons() {
      const hasText = input.value.trim().length > 0;
      micBtn.hidden = hasText;
      sendBtn.hidden = !hasText;
    }

    function formatRecTime(ms) {
      const sec = Math.floor(ms / 1000);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function showRecordingUi() {
      textRow.hidden = true;
      recRow.hidden = false;
      recStartedAt = Date.now();
      recTimerEl.textContent = "0:00";
      liveFinal = "";
      liveInterim = "";
      updateLiveTranscript();
      clearInterval(recTimerId);
      recTimerId = setInterval(() => {
        recTimerEl.textContent = formatRecTime(Date.now() - recStartedAt);
      }, 250);
    }

    function hideRecordingUi() {
      clearInterval(recTimerId);
      recTimerId = null;
      recRow.hidden = true;
      textRow.hidden = false;
      syncComposerButtons();
      input.focus();
    }

    function updateLiveTranscript() {
      const finalPart = liveFinal.trim();
      const interimPart = liveInterim.trim();
      recLiveEl.classList.toggle("has-text", !!(finalPart || interimPart));
      if (!finalPart && !interimPart) {
        recLiveEl.innerHTML = "";
        return;
      }
      recLiveEl.innerHTML =
        (finalPart ? escapeHtml(finalPart) + (interimPart ? " " : "") : "") +
        (interimPart ? `<span class="interim">${escapeHtml(interimPart)}</span>` : "");
      recLiveEl.scrollTop = recLiveEl.scrollHeight;
    }

    function getLiveTranscript() {
      return `${liveFinal} ${liveInterim}`.replace(/\s+/g, " ").trim();
    }

    function stopSpeechRecognition() {
      if (!recognition) return;
      try {
        recognition.onend = null;
        recognition.stop();
      } catch (_) { /* ignore */ }
      recognition = null;
    }

    function startSpeechRecognition() {
      if (!SpeechRecognitionAPI) return false;
      recognition = new SpeechRecognitionAPI();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.lang = navigator.language || "en-US";

      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const piece = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            liveFinal += (liveFinal && !liveFinal.endsWith(" ") ? " " : "") + piece;
          } else {
            interim += piece;
          }
        }
        liveInterim = interim;
        updateLiveTranscript();
      };

      recognition.onerror = (event) => {
        if (event.error === "aborted" || event.error === "no-speech") return;
        if (event.error === "not-allowed") {
          addBubble("Microphone permission denied for live transcription.", "bot");
        }
      };

      recognition.onend = () => {
        // Chrome stops after a pause — keep listening while recording
        if (isRecording && recognition) {
          try { recognition.start(); } catch (_) { /* already started */ }
        }
      };

      try {
        recognition.start();
        return true;
      } catch (_) {
        recognition = null;
        return false;
      }
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      micBtn.disabled = busy;
      stopRecBtn.disabled = busy;
      cancelRecBtn.disabled = busy;
      input.disabled = busy;
    }

    function addBubble(text, who, extraClass = "") {
      const div = document.createElement("div");
      div.className = `bubble ${who}${extraClass ? " " + extraClass : ""}`;

      if (who === "bot" && !extraClass.includes("typing") && canSpeak) {
        div.classList.add("has-play");
        const body = document.createElement("div");
        body.className = "bubble-text";
        body.textContent = text;
        const play = document.createElement("button");
        play.type = "button";
        play.className = "bubble-play";
        play.title = "Play this reply";
        play.setAttribute("aria-label", "Play reply");
        play.textContent = "▶";
        play.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          speakText(text, { force: true, playBtn: play });
        });
        div.appendChild(body);
        div.appendChild(play);
      } else {
        div.textContent = text;
      }

      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      return div;
    }

    function showTyping(label = "Processing…") {
      const div = document.createElement("div");
      div.className = "bubble bot typing";
      div.id = "typingIndicator";
      div.innerHTML = `<span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="typing-label">${escapeHtml(label)}</span>`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      return div;
    }

    function hideTyping() {
      document.getElementById("typingIndicator")?.remove();
    }

    function setPending(event) {
      pendingEvent = event;
    }

    function setConfirmUi(show) {
      if (!confirmActions) return;
      confirmActions.hidden = !show;
    }

    function setPlaceholder(nextField) {
      if (!input) return;
      input.placeholder = PLACEHOLDERS[nextField] || PLACEHOLDERS.default;
    }

    function setSlotChips(suggestions) {
      if (!slotChips) return;
      const list = Array.isArray(suggestions) ? suggestions.filter(Boolean) : [];
      // Confirm screen uses dedicated Yes/No — skip duplicating Yes/No as chips
      const chips = list.filter((s) => {
        const t = String(s).toLowerCase();
        return t !== "yes, save" && t !== "no";
      });
      slotChips.innerHTML = "";
      if (!chips.length) {
        slotChips.hidden = true;
        return;
      }
      chips.forEach((label) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = label;
        btn.addEventListener("click", async () => {
          addBubble(label, "user");
          setSlotChips([]);
          await chat(label, false);
        });
        slotChips.appendChild(btn);
      });
      slotChips.hidden = false;
    }

    function mergePending(prev, next) {
      if (!next) return prev || null;
      if (!prev) return next;
      const keys = ["date", "time", "category", "label", "notes"];
      const out = { ...prev, ...next };
      for (const k of keys) {
        const n = next[k];
        const p = prev[k];
        const nOk = n !== null && n !== undefined && String(n).trim() !== "" && String(n).toLowerCase() !== "null";
        const pOk = p !== null && p !== undefined && String(p).trim() !== "" && String(p).toLowerCase() !== "null";
        out[k] = nOk ? n : (pOk ? p : null);
      }
      if (next._awaiting_confirm) out._awaiting_confirm = true;
      else if (prev._awaiting_confirm && next._awaiting_confirm !== false) {
        out._awaiting_confirm = true;
      }
      return out;
    }

    function applyAssistantResult(data) {
      const msg = data.message || JSON.stringify(data);
      const bubble = addBubble(msg, "bot");
      const playBtn = bubble.querySelector(".bubble-play");
      speakText(msg, { playBtn });
      setConfirmUi(Boolean(data.needs_confirmation));
      const nextField = (data.missing_fields && data.missing_fields[0]) || null;
      setPlaceholder(data.needs_confirmation ? "default" : nextField);
      if (data.needs_confirmation) {
        setSlotChips(data.suggested_replies || ["Change time", "Change date"]);
      } else if (data.event || data.intent === "cancel_event") {
        setSlotChips([]);
      } else {
        setSlotChips(data.suggested_replies || []);
      }
      if (data.event) {
        setPending(null);
        setConfirmUi(false);
        setPlaceholder("default");
        return refreshEvents();
      }
      if (data.intent === "search_events") {
        if (data.events?.length) {
          const list = data.events.map((e) =>
            `• ${e.label} — ${e.event_date}${e.event_time ? " " + String(e.event_time).slice(0,5) : ""} (${e.category})`
          ).join("\n");
          const listBubble = addBubble(list, "bot");
          speakText(`Found ${data.events.length} events.`, {
            playBtn: listBubble.querySelector(".bubble-play"),
          });
        }
      } else if (data.intent === "cancel_event") {
        setPending(null);
        setConfirmUi(false);
        setPlaceholder("default");
      } else if (data.pending_event) {
        setPending(mergePending(pendingEvent, data.pending_event));
      } else if (data.missing_fields?.length) {
        setPending(mergePending(pendingEvent, data.pending_event || pendingEvent));
      }
      return Promise.resolve();
    }

    async function refreshEvents() {
      const res = await fetch(`${API}/api/events?user_id=${encodeURIComponent(userId)}`);
      const data = await res.json();
      if (!data.length) {
        eventsEl.innerHTML = '<div class="empty">No events yet.</div>';
        return;
      }
      eventsEl.innerHTML = data.map((e) => `
        <div class="event">
          <strong>${escapeHtml(e.label)}</strong>
          <span>${e.event_date}${e.event_time ? " · " + String(e.event_time).slice(0,5) : ""} · ${escapeHtml(e.category)}</span>
        </div>
      `).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    async function chat(message, confirm = false) {
      const lower = message.toLowerCase();
      const freshCreate = /\b(add|create|schedule|remind|reminder|new event|new reminder)\b/.test(lower)
        && !/^(todo|to do|important|appointment)\b/i.test(lower.trim());
      if (freshCreate) setPending(null);

      setBusy(true);
      showTyping("Thinking…");
      try {
        const body = {
          message,
          user_id: userId,
          confirm: Boolean(confirm),
        };
        if (pendingEvent) body.pending_event = pendingEvent;

        const res = await fetch(`${API}/api/assistant/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        hideTyping();
        await applyAssistantResult(data);
      } catch (err) {
        hideTyping();
        addBubble("Request failed: " + err.message, "bot");
      } finally {
        setBusy(false);
      }
    }

    async function sendVoice(blob) {
      setBusy(true);
      showTyping("Listening / transcribing…");
      try {
        const formData = new FormData();
        formData.append("audio", blob, "note.webm");
        formData.append("user_id", userId);
        formData.append("confirm", "false");
        if (pendingEvent) {
          formData.append("pending_event", JSON.stringify(pendingEvent));
        }
        const res = await fetch(`${API}/api/assistant/voice`, {
          method: "POST",
          body: formData,
        });
        const data = await res.json().catch(() => ({}));
        hideTyping();
        if (!res.ok) {
          addBubble(data.detail || "Voice processing failed.", "bot");
          return;
        }
        if (data.transcript) {
          addBubble(data.transcript, "user", "voice");
        }
        await applyAssistantResult(data);
      } catch (err) {
        hideTyping();
        addBubble("Voice request failed: " + err.message, "bot");
      } finally {
        setBusy(false);
      }
    }

    async function finishRecordingSend() {
      const liveText = getLiveTranscript();
      hideRecordingUi();

      if (discardRecording) {
        discardRecording = false;
        audioChunks = [];
        return;
      }

      // Live transcript ready — send instantly (no Whisper wait)
      if (liveText) {
        audioChunks = [];
        addBubble(liveText, "user", "voice");
        await chat(liveText, false);
        return;
      }

      // Fallback: upload audio to server Whisper
      const blob = new Blob(audioChunks, { type: mediaRecorder?.mimeType || "audio/webm" });
      audioChunks = [];
      if (blob.size < 200) {
        addBubble("No speech detected. Try again or type your message.", "bot");
        return;
      }
      await sendVoice(blob);
    }

    async function startRecording() {
      stopSpeaking();
      discardRecording = false;
      liveFinal = "";
      liveInterim = "";
      useLiveSpeech = false;
      audioChunks = [];

      if (!SpeechRecognitionAPI && !navigator.mediaDevices?.getUserMedia) {
        addBubble("Microphone / live speech not supported. Use Chrome or Edge.", "bot");
        return;
      }

      try {
        if (navigator.mediaDevices?.getUserMedia) {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
            ? "audio/webm;codecs=opus"
            : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
          mediaRecorder = mime
            ? new MediaRecorder(mediaStream, { mimeType: mime })
            : new MediaRecorder(mediaStream);
          mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) audioChunks.push(e.data);
          };
          mediaRecorder.onstop = async () => {
            mediaStream?.getTracks().forEach((t) => t.stop());
            mediaStream = null;
            await finishRecordingSend();
          };
          mediaRecorder.start(250);
        }

        useLiveSpeech = startSpeechRecognition();
        isRecording = true;
        showRecordingUi();
        if (!useLiveSpeech) {
          recLiveEl.classList.add("has-text");
          recLiveEl.textContent = "Recording… (live text needs Chrome/Edge)";
        }
      } catch (err) {
        stopSpeechRecognition();
        mediaStream?.getTracks().forEach((t) => t.stop());
        mediaStream = null;
        addBubble("Microphone permission denied or unavailable.", "bot");
      }
    }

    function stopRecording({ discard = false } = {}) {
      if (!isRecording) return;
      discardRecording = discard;
      isRecording = false;
      stopSpeechRecognition();

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        return;
      }

      // Live-only path (no MediaRecorder)
      finishRecordingSend();
    }

    micBtn.addEventListener("click", async () => {
      if (!isRecording) await startRecording();
    });

    stopRecBtn.addEventListener("click", () => stopRecording());
    cancelRecBtn.addEventListener("click", () => stopRecording({ discard: true }));

    input.addEventListener("input", syncComposerButtons);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (isRecording) {
        stopRecording();
        return;
      }
      const text = input.value.trim();
      if (!text) return;
      addBubble(text, "user");
      input.value = "";
      syncComposerButtons();
      await chat(text, false);
    });

    confirmYes?.addEventListener("click", async () => {
      setConfirmUi(false);
      addBubble("Yes, save", "user");
      await chat("yes", true);
    });

    confirmNo?.addEventListener("click", async () => {
      setConfirmUi(false);
      addBubble("No", "user");
      await chat("no", false);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && isRecording) {
        e.preventDefault();
        stopRecording();
      }
      if (e.key === "Escape" && isRecording) {
        e.preventDefault();
        stopRecording({ discard: true });
      }
    });

    clearBtn.addEventListener("click", async () => {
      const ok = window.confirm("Clear chat and delete ALL saved reminders?");
      if (!ok) return;
      if (isRecording) stopRecording({ discard: true });
      stopSpeaking();
      setBusy(true);
      showTyping("Clearing…");
      try {
        const res = await fetch(
          `${API}/api/events?user_id=${encodeURIComponent(userId)}`,
          { method: "DELETE" }
        );
        const data = await res.json().catch(() => ({}));
        hideTyping();
        if (!res.ok) {
          addBubble(data.detail || "Clear failed.", "bot");
          return;
        }
        setPending(null);
        setConfirmUi(false);
        setSlotChips([]);
        setPlaceholder("default");
        logEl.innerHTML = "";
        welcomeSpoken = false;
        const msg = data.message || "Chat and reminders cleared.";
        addBubble(msg, "bot");
        addBubble(WELCOME_MSG, "bot");
        speakText(`${msg} ${WELCOME_MSG}`, { isWelcome: true });
        await refreshEvents();
      } catch (err) {
        hideTyping();
        addBubble("Clear failed: " + err.message, "bot");
      } finally {
        setBusy(false);
      }
    });

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/api/health`);
        const data = await res.json();
        const runtime = data.ai || data.ollama || {};
        const ollamaOk = runtime.ok && runtime.model_available;
        const voice = data.voice || {};
        const liveOk = !!SpeechRecognitionAPI;
        dot.classList.toggle("ok", !!ollamaOk);
        const model = data.ai_model || data.model;
        let label = ollamaOk
          ? `Ready · ${data.ai_provider || "ollama"} · ${model}`
          : `API up · AI: ${runtime.error || "model not found — run ollama pull " + model}`;
        label += liveOk ? " · Live STT: on" : " · Live STT: use Chrome/Edge";
        if (voice.enabled) {
          label += voice.ok ? ` · Whisper fallback: ${voice.model || "ok"}` : " · Whisper: setup needed";
        }
        healthEl.textContent = label;
      } catch {
        healthEl.textContent = "API unreachable";
      }
    }

    syncComposerButtons();
    welcomeBubbleEl = addBubble(WELCOME_MSG, "bot");
    bindWelcomeUnlock();
    setTimeout(tryWelcomeSpeak, 500);
    checkHealth();
    refreshEvents();
  </script>
</body>
</html>
