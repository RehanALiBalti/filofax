<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Filofax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #15231c;
      --muted: #5a6b62;
      --paper: #eef3ee;
      --panel: rgba(250, 252, 249, 0.92);
      --line: rgba(21, 35, 28, 0.1);
      --accent: #0b6b4f;
      --accent-deep: #084f3b;
      --accent-soft: #d4ebe1;
      --user-bubble: linear-gradient(145deg, #0d7a5a 0%, #0b6b4f 55%, #095c44 100%);
      --bot-sheet: #ffffff;
      --warn: #8a4b12;
      --danger: #8b2e2e;
      --shadow: 0 20px 48px rgba(21, 35, 28, 0.1);
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Outfit", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 70% 45% at 8% -5%, #b8dccb 0%, transparent 52%),
        radial-gradient(ellipse 55% 38% at 96% 4%, #d5e2d0 0%, transparent 48%),
        linear-gradient(168deg, #e4ece6 0%, var(--paper) 42%, #dde8e2 100%);
      -webkit-tap-highlight-color: transparent;
    }
    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding:
        max(0.65rem, env(safe-area-inset-top))
        max(0.65rem, env(safe-area-inset-right))
        max(0.65rem, env(safe-area-inset-bottom))
        max(0.65rem, env(safe-area-inset-left));
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 100vh;
      min-height: 100dvh;
      height: 100dvh;
    }
    .layout {
      display: grid;
      grid-template-columns: 1.45fr 0.85fr;
      gap: 0.85rem;
      flex: 1;
      min-height: 0;
      height: auto;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 1.15rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
    }
    .panel.chat-panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, transparent 28%), var(--panel);
    }
    .panel h2 {
      margin: 0;
      padding: 0.85rem 1rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-bottom: 1px solid var(--line);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.9rem 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      background: repeating-linear-gradient(transparent, transparent 27px, rgba(11, 107, 79, 0.035) 28px);
      scroll-behavior: smooth;
    }
    @media (max-width: 800px) {
      .shell {
        padding:
          max(0.4rem, env(safe-area-inset-top))
          max(0.4rem, env(safe-area-inset-right))
          max(0.4rem, env(safe-area-inset-bottom))
          max(0.4rem, env(safe-area-inset-left));
        gap: 0.5rem;
      }
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
        height: auto;
        flex: 1;
        gap: 0.5rem;
      }
      .panel.chat-panel {
        min-height: 0;
        border-radius: 1rem;
      }
      .panel.events-panel {
        height: auto;
        max-height: 32dvh;
        min-height: 7.5rem;
        border-radius: 1rem;
      }
      .bubble { max-width: 94%; }
      .composer {
        padding: 0.45rem 0.5rem calc(0.55rem + env(safe-area-inset-bottom));
      }
      .panel-head {
        padding: 0.55rem 0.65rem;
        gap: 0.4rem;
      }
      .panel-head h2 {
        font-size: 0.82rem;
        padding: 0;
      }
      .panel-actions {
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      button.tts-toggle,
      button.clear-reminder {
        padding: 0.35rem 0.55rem;
        font-size: 0.75rem;
      }
      .icon-btn {
        width: 2.65rem;
        height: 2.65rem;
      }
      .composer-input-wrap {
        min-height: 2.55rem;
      }
      #events {
        padding: 0.55rem 0.65rem;
      }
    }
    @media (max-width: 420px) {
      .panel.events-panel {
        max-height: 26dvh;
      }
      .confirm-actions button {
        flex: 1 1 auto;
        text-align: center;
      }
    }
    .bubble {
      max-width: 88%;
      padding: 0.8rem 0.95rem;
      border-radius: 1.05rem;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 0.95rem;
      animation: bubbleIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: #f4fffa;
      border-bottom-right-radius: 0.3rem;
      box-shadow: 0 8px 22px rgba(11, 107, 79, 0.22);
    }
    .bubble.bot {
      align-self: flex-start;
      background: var(--bot-sheet);
      border: 1px solid rgba(21, 35, 28, 0.08);
      border-bottom-left-radius: 0.3rem;
      box-shadow: 0 6px 18px rgba(21, 35, 28, 0.05);
    }
    .bubble.bot.has-play {
      display: flex;
      align-items: flex-start;
      gap: 0.55rem;
      padding-right: 0.55rem;
    }
    .bubble-avatar {
      flex-shrink: 0;
      width: 1.7rem;
      height: 1.7rem;
      border-radius: 50%;
      background: linear-gradient(145deg, #1a4d3c, var(--accent));
      color: #e8fff5;
      font-family: "Fraunces", serif;
      font-size: 0.72rem;
      font-weight: 700;
      font-style: italic;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.12rem;
      box-shadow: 0 2px 8px rgba(11, 107, 79, 0.25);
    }
    .bubble-text { flex: 1; min-width: 0; }
    .bubble-play {
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      border: 0;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      line-height: 1;
      margin-top: 0.1rem;
      transition: background 0.15s ease, transform 0.12s ease;
    }
    .bubble-play:hover { background: #c5e6d9; transform: scale(1.05); }
    .bubble-play:active { transform: scale(0.92); }
    .bubble-play.playing {
      background: var(--accent);
      color: #fff;
      animation: playPulse 1s ease-in-out infinite;
    }
    .bubble-play.needs-tap {
      background: #ffe8a3;
      color: #6b4e00;
      box-shadow: 0 0 0 3px rgba(255, 200, 60, 0.45);
      animation: tapPulse 1.1s ease-in-out infinite;
      transform: scale(1.08);
    }
    @keyframes tapPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(255, 200, 60, 0.35); }
      50% { box-shadow: 0 0 0 7px rgba(255, 200, 60, 0.15); }
    }
    .tts-tap-hint {
      display: none;
      margin: 0.15rem 0.85rem 0.35rem;
      padding: 0.45rem 0.75rem;
      border-radius: 0.65rem;
      background: #fff6d6;
      border: 1px solid rgba(150, 110, 20, 0.25);
      color: #6b4e00;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .tts-tap-hint.show { display: block; animation: bubbleIn 0.25s ease both; }
    @keyframes playPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .bubble.meta {
      font-size: 0.8rem;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 0 0.2rem;
      box-shadow: none;
      animation: none;
    }
    .composer {
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, #e6ebe6 0%, #dde5df 100%);
      padding: 0.55rem 0.65rem 0.7rem;
    }
    .composer-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 3rem;
    }
    .composer-row[hidden] { display: none !important; }
    .composer-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 1.5rem;
      border: 1px solid rgba(21, 35, 28, 0.1);
      padding: 0.15rem 0.85rem;
      min-height: 2.7rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 4px 14px rgba(21, 35, 28, 0.04);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .composer-input-wrap:focus-within {
      border-color: rgba(11, 107, 79, 0.35);
      box-shadow: 0 0 0 3px rgba(11, 107, 79, 0.12);
    }
    .composer-input-wrap input[type="text"] {
      flex: 1;
      border: 0;
      outline: none;
      padding: 0.55rem 0;
      font: inherit;
      background: transparent;
      min-width: 0;
    }
    .composer-input-wrap input::placeholder { color: #8a97a6; }
    .confirm-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0.45rem 0.85rem 0.15rem;
      flex-wrap: wrap;
      animation: bubbleIn 0.3s ease both;
    }
    .confirm-actions[hidden] { display: none !important; }
    .confirm-actions button {
      border: 0;
      border-radius: 999px;
      padding: 0.5rem 1.15rem;
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.15s ease;
    }
    .confirm-actions button:hover { transform: translateY(-1px); }
    .confirm-actions .yes {
      background: var(--user-bubble);
      color: #fff;
      box-shadow: 0 6px 16px rgba(11, 107, 79, 0.25);
    }
    .confirm-actions .no {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(21, 35, 28, 0.14);
    }
    .slot-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem 0.25rem;
      animation: bubbleIn 0.32s ease both;
    }
    .slot-chips[hidden] { display: none !important; }
    .slot-chips button {
      border: 1px solid rgba(21, 35, 28, 0.12);
      background: #fff;
      color: var(--ink);
      border-radius: 0.65rem;
      padding: 0.42rem 0.8rem;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }
    .slot-chips button:hover {
      background: var(--accent-soft);
      border-color: rgba(11, 107, 79, 0.35);
      color: var(--accent-deep);
      transform: translateY(-1px);
    }
    .icon-btn {
      border: 0;
      width: 2.85rem;
      height: 2.85rem;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      font: inherit;
      transition: transform 0.12s ease, background 0.12s ease;
    }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn:disabled { opacity: 0.5; cursor: wait; }
    .icon-btn svg { width: 1.35rem; height: 1.35rem; display: block; }
    .icon-btn.mic {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 16px rgba(11, 107, 79, 0.28);
    }
    .icon-btn.send {
      background: var(--accent-deep);
      color: #fff;
    }
    .icon-btn.send[hidden],
    .icon-btn.mic[hidden] { display: none !important; }
    .icon-btn.stop-send {
      background: var(--accent);
      color: #fff;
    }
    .icon-btn.cancel-rec {
      background: transparent;
      color: var(--muted);
      width: 2.5rem;
      height: 2.5rem;
      border: 1px solid rgba(21, 35, 28, 0.12);
    }
    .icon-btn.cancel-rec:hover { color: var(--danger); }
    button.ghost {
      border: 0;
      border-radius: 0.75rem;
      padding: 0.65rem 1rem;
      font: inherit;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      cursor: pointer;
    }
    .rec-bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.2rem;
      min-width: 0;
      padding: 0 0.25rem;
    }
    .rec-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .rec-dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      background: #e53935;
      flex-shrink: 0;
      animation: recBlink 1s ease-in-out infinite;
    }
    @keyframes recBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }
    .rec-timer {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--muted);
      min-width: 2.5rem;
    }
    .rec-live {
      font-size: 0.92rem;
      line-height: 1.35;
      color: var(--ink);
      max-height: 2.7rem;
      overflow-y: auto;
      word-break: break-word;
      min-height: 1.2rem;
    }
    .rec-live .interim { color: var(--muted); }
    .rec-live:empty::before {
      content: "Listening… speak now";
      color: var(--muted);
      font-style: italic;
    }
    .rec-live.has-text:empty::before { content: none; }
    .bubble.voice {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .bubble.voice::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: #25d366;
      flex-shrink: 0;
    }
    .bubble.typing {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 3.5rem;
      padding: 0.85rem 1rem;
    }
    .bubble.typing .dot {
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 50%;
      background: var(--muted);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .bubble.typing .dot:nth-child(2) { animation-delay: 0.15s; }
    .bubble.typing .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .bubble.typing .typing-label {
      margin-left: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    #events {
      flex: 1;
      min-height: 0;
      padding: 0.75rem 1rem 1rem;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .event {
      padding: 0.75rem 0.85rem;
      border-radius: 0.8rem;
      background: #fff;
      border: 1px solid var(--line);
    }
    .event strong { display: block; margin-bottom: 0.2rem; }
    .event span { color: var(--muted); font-size: 0.85rem; }
    .empty { color: var(--muted); font-size: 0.9rem; padding: 0.5rem; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--line);
    }
    .panel-head h2 {
      margin: 0;
      padding: 0;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    button.clear-reminder {
      border: 1px solid rgba(139, 46, 46, 0.35);
      border-radius: 999px;
      padding: 0.4rem 0.85rem;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      background: #f8eaea;
      color: var(--danger);
      cursor: pointer;
      white-space: nowrap;
    }
    button.clear-reminder:hover:not(:disabled) {
      background: #f0d4d4;
    }
    button.clear-reminder:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .panel-actions {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    button.tts-toggle {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      font: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      cursor: pointer;
      white-space: nowrap;
    }
    button.tts-toggle.off {
      background: #eee;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 0.9rem 0.9rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="layout">
      <section class="panel chat-panel">
        <div class="panel-head">
          <h2>Chat</h2>
          <div class="panel-actions">
            <button type="button" class="tts-toggle" id="ttsBtn" title="Toggle voice replies">🔊 Voice on</button>
            <button type="button" class="clear-reminder" id="clearBtn" title="Clear chat and delete all saved reminders">
              Clear
            </button>
          </div>
        </div>
        <div id="log"></div>
        <form id="chatForm" class="composer" autocomplete="off">
          <div class="confirm-actions" id="confirmActions" hidden>
            <button type="button" class="yes" id="confirmYes">Yes, save</button>
            <button type="button" class="no" id="confirmNo">No</button>
          </div>
          <button type="button" class="tts-tap-hint" id="ttsTapHint" hidden>🔊 Tap to hear reply</button>
          <div class="slot-chips" id="slotChips" hidden></div>
          <div class="composer-row" id="textRow">
            <div class="composer-input-wrap">
              <input id="message" type="text" placeholder="Message" autocomplete="off" enterkeyhint="send" />
            </div>
            <button type="button" class="icon-btn mic" id="micBtn" title="Voice note" aria-label="Voice note">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
            </button>
            <button type="submit" class="icon-btn send" id="sendBtn" title="Send" aria-label="Send" hidden>
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
          <div class="composer-row" id="recRow" hidden>
            <button type="button" class="icon-btn cancel-rec" id="cancelRecBtn" title="Cancel" aria-label="Cancel recording">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
            <div class="rec-bar">
              <div class="rec-meta">
                <span class="rec-dot" aria-hidden="true"></span>
                <span class="rec-timer" id="recTimer">0:00</span>
              </div>
              <div class="rec-live" id="recLive" aria-live="polite"></div>
            </div>
            <button type="button" class="icon-btn stop-send" id="stopRecBtn" title="Send" aria-label="Send">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </form>
      </section>

      <section class="panel events-panel">
        <h2>Reminders</h2>
        <div id="events"><div class="empty">No reminders yet.</div></div>
      </section>
    </div>
  </div>

  <script>
    const API = (() => {
      const path = window.location.pathname || "";
      if (path === "/filofax" || path.startsWith("/filofax/")) return "/filofax";
      return "";
    })();
    const userId = "default";
    let pendingEvent = null;

    const logEl = document.getElementById("log");
    const eventsEl = document.getElementById("events");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const textRow = document.getElementById("textRow");
    const recRow = document.getElementById("recRow");
    const recTimerEl = document.getElementById("recTimer");
    const recLiveEl = document.getElementById("recLive");
    const stopRecBtn = document.getElementById("stopRecBtn");
    const cancelRecBtn = document.getElementById("cancelRecBtn");
    const clearBtn = document.getElementById("clearBtn");
    const ttsBtn = document.getElementById("ttsBtn");
    const confirmActions = document.getElementById("confirmActions");
    const confirmYes = document.getElementById("confirmYes");
    const confirmNo = document.getElementById("confirmNo");
    const slotChips = document.getElementById("slotChips");

    const PLACEHOLDERS = {
      date: "e.g. 20 August 2026, 10 pm",
      time: "e.g. 10 pm",
      category: "To Do · Appointment · Important",
      label: "Type a short title / label…",
      default: "Date and time, or just say hi…",
    };

    const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
    const canSpeak = !!window.speechSynthesis;

    let mediaRecorder = null;
    let mediaStream = null;
    let audioChunks = [];
    let isRecording = false;
    let discardRecording = false;
    let recStartedAt = 0;
    let recTimerId = null;
    let recognition = null;
    let liveFinal = "";
    let liveInterim = "";
    let useLiveSpeech = false;
    let ttsEnabled = true;
    let welcomeSpoken = false;
    let welcomeUnlockBound = false;

    const WELCOME_MSG =
      "Let's set up the event. What is the date and time for this event?";

    function loadVoices() {
      if (!canSpeak) return [];
      return window.speechSynthesis.getVoices() || [];
    }

    // Prefer natural female voices (Neural / Online / known female names)
    const FEMALE_NAME_RE =
      /female|zira|samantha|karen|moira|fiona|tessa|victoria|susan|hazel|catherine|serena|aria|jenny|sonia|natasha|neerja|heera|google us english|microsoft aria|microsoft jenny|microsoft zira|Samantha|Karen/i;
    const MALE_NAME_RE =
      /male|\bdavid\b|\bmark\b|\bravi\b|\brichard\b|\bgeorge\b|\bfred\b|\balex\b|\bdaniel\b|\bbrian\b|\bthomas\b|microsoft david|microsoft mark|google uk english male/i;
    const QUALITY_RE = /neural|natural|online|premium|enhanced|wavenet|studio|google|microsoft.*online/i;

    function scoreVoice(v, lang, primary) {
      const name = v.name || "";
      const vLang = (v.lang || "").toLowerCase();
      let score = 0;

      if (MALE_NAME_RE.test(name) && !/female/i.test(name)) score -= 100;
      if (FEMALE_NAME_RE.test(name)) score += 80;
      // localService false often = cloud/neural higher quality on Chromium
      if (v.localService === false) score += 40;
      if (QUALITY_RE.test(name)) score += 50;
      if (vLang === lang) score += 30;
      else if (vLang.startsWith(primary)) score += 20;
      else if (/^en[-_]/.test(vLang) || vLang === "en") score += 15;
      else score -= 20;
      // Prefer en-US / en-GB natural assistants
      if (/en[-_]?us/i.test(vLang)) score += 10;
      if (/en[-_]?gb/i.test(vLang) && FEMALE_NAME_RE.test(name)) score += 8;
      return score;
    }

    function pickVoice() {
      const voices = loadVoices();
      if (!voices.length) return null;
      const lang = (navigator.language || "en-US").toLowerCase();
      const primary = lang.split("-")[0];

      const ranked = voices
        .map((v) => ({ v, score: scoreVoice(v, lang, primary) }))
        .sort((a, b) => b.score - a.score);

      // Best female / high-quality pick
      const best = ranked[0]?.v || null;
      if (best && scoreVoice(best, lang, primary) > 0) return best;

      // Fallback: any English voice that doesn't look male
      return (
        voices.find((v) => /en/i.test(v.lang) && !MALE_NAME_RE.test(v.name)) ||
        voices.find((v) => FEMALE_NAME_RE.test(v.name)) ||
        voices.find((v) => /en/i.test(v.lang)) ||
        voices[0]
      );
    }

    let cachedVoice = null;
    function getAssistantVoice() {
      const voices = loadVoices();
      if (!voices.length) return null;
      if (cachedVoice && voices.includes(cachedVoice)) return cachedVoice;
      cachedVoice = pickVoice();
      return cachedVoice;
    }

    let speakTimer = null;
    let keepAliveTimer = null;
    let activePlayBtn = null;
    let speakGeneration = 0;
    let audioUnlocked = false;
    let speakRetryTimer = null;
    let pendingSpeak = null; // { text, playBtn } — flushed on next user gesture (mobile)
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
      || (navigator.maxTouchPoints > 1 && /Mac/i.test(navigator.platform || ""));
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent)
      || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    const ttsTapHint = document.getElementById("ttsTapHint");

    function clearNeedsTap() {
      document.querySelectorAll(".bubble-play.needs-tap").forEach((el) => {
        el.classList.remove("needs-tap");
      });
      if (ttsTapHint) {
        ttsTapHint.hidden = true;
        ttsTapHint.classList.remove("show");
      }
    }

    function showTapToHear(playBtn) {
      if (playBtn) playBtn.classList.add("needs-tap");
      if (ttsTapHint) {
        ttsTapHint.hidden = false;
        ttsTapHint.classList.add("show");
      }
    }

    function stopSpeaking() {
      if (!canSpeak) return;
      speakGeneration += 1;
      if (speakTimer) {
        clearTimeout(speakTimer);
        speakTimer = null;
      }
      if (keepAliveTimer) {
        clearInterval(keepAliveTimer);
        keepAliveTimer = null;
      }
      if (speakRetryTimer) {
        clearTimeout(speakRetryTimer);
        speakRetryTimer = null;
      }
      if (activePlayBtn) {
        activePlayBtn.classList.remove("playing");
        activePlayBtn = null;
      }
      try {
        window.speechSynthesis.cancel();
      } catch (_) { /* ignore */ }
    }

    /**
     * Must run inside a real user gesture (touch/click), sync — no await before this.
     * iOS/Android block speech after fetch(); unlock warms the engine for later / pending flush.
     */
    function unlockSpeechAudio() {
      if (!canSpeak) return;
      audioUnlocked = true;
      try {
        window.speechSynthesis.resume();
      } catch (_) { /* ignore */ }
      try {
        // Don't interrupt a reply that's already playing
        if (window.speechSynthesis.speaking || window.speechSynthesis.pending) return;
        // Do NOT cancel on iOS — cancel undoes the unlock gesture
        const warm = new SpeechSynthesisUtterance(isIOS ? "." : " ");
        warm.volume = isIOS ? 0.01 : 0;
        warm.rate = 2;
        warm.pitch = 1;
        warm.lang = navigator.language || "en-US";
        window.speechSynthesis.speak(warm);
        if (!isIOS) {
          window.speechSynthesis.cancel();
        }
      } catch (_) { /* ignore */ }
    }

    function ttsClean(text) {
      return String(text || "")
        .replace(/[•●]/g, ". ")
        .replace(/[▶◄►]/g, " ")
        .replace(/[*_`#]+/g, "")
        .replace(/\s*\n\s*/g, ". ")
        .replace(/\s+/g, " ")
        .replace(/\.(\s*\.)+/g, ".")
        .trim();
    }

    function queuePendingSpeak(text, playBtn) {
      pendingSpeak = { text, playBtn: playBtn || null };
      showTapToHear(playBtn);
    }

    /** Speak pending reply during the current user gesture (mobile-safe). */
    function flushPendingSpeak() {
      if (!pendingSpeak || !ttsEnabled || !canSpeak) return false;
      const job = pendingSpeak;
      pendingSpeak = null;
      clearNeedsTap();
      speakText(job.text, {
        force: true,
        playBtn: job.playBtn,
        immediate: true,
        fromGesture: true,
      });
      return true;
    }

    function speakText(text, {
      isWelcome = false,
      force = false,
      playBtn = null,
      immediate = false,
      fromGesture = false,
    } = {}) {
      if ((!ttsEnabled && !force) || !canSpeak || !text) return;
      const clean = ttsClean(text);
      if (!clean) return;

      const myGen = ++speakGeneration;

      const markFailedAuto = () => {
        if (isWelcome) welcomeSpoken = false;
        // Keep a pending play for the next tap (required on iOS / many Android browsers)
        queuePendingSpeak(clean, playBtn);
      };

      const kick = (attempt) => {
        if (myGen !== speakGeneration) return;

        if (speakTimer) {
          clearTimeout(speakTimer);
          speakTimer = null;
        }
        if (keepAliveTimer) {
          clearInterval(keepAliveTimer);
          keepAliveTimer = null;
        }
        if (speakRetryTimer) {
          clearTimeout(speakRetryTimer);
          speakRetryTimer = null;
        }

        // Avoid cancel-before-speak on first gesture attempt (breaks iOS)
        if (!(fromGesture && attempt === 0 && immediate)) {
          try {
            window.speechSynthesis.cancel();
          } catch (_) { /* ignore */ }
        }

        const delay = immediate && attempt === 0 ? 0 : (attempt === 0 ? (isMobile ? 80 : 140) : 240);

        speakTimer = setTimeout(() => {
          if (myGen !== speakGeneration) return;
          try {
            window.speechSynthesis.resume();
          } catch (_) { /* ignore */ }

          const utter = new SpeechSynthesisUtterance(clean);
          const voice = getAssistantVoice();
          if (voice) {
            utter.voice = voice;
            utter.lang = voice.lang || "en-US";
          } else {
            utter.lang = navigator.language || "en-US";
          }
          utter.rate = isIOS ? 1 : 0.95;
          utter.pitch = 1.08;
          utter.volume = 1;

          let started = false;
          if (playBtn) {
            activePlayBtn = playBtn;
            playBtn.classList.add("playing");
            playBtn.classList.remove("needs-tap");
          }

          utter.onstart = () => {
            started = true;
            if (isWelcome) welcomeSpoken = true;
            audioUnlocked = true;
            if (pendingSpeak && pendingSpeak.text === clean) pendingSpeak = null;
            clearNeedsTap();
          };

          keepAliveTimer = setInterval(() => {
            if (myGen !== speakGeneration) {
              clearInterval(keepAliveTimer);
              keepAliveTimer = null;
              return;
            }
            try {
              if (!window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
                clearInterval(keepAliveTimer);
                keepAliveTimer = null;
                return;
              }
              window.speechSynthesis.resume();
            } catch (_) {
              clearInterval(keepAliveTimer);
              keepAliveTimer = null;
            }
          }, 3000);

          const done = () => {
            if (keepAliveTimer) {
              clearInterval(keepAliveTimer);
              keepAliveTimer = null;
            }
            if (speakRetryTimer) {
              clearTimeout(speakRetryTimer);
              speakRetryTimer = null;
            }
            if (playBtn) playBtn.classList.remove("playing");
            if (activePlayBtn === playBtn) activePlayBtn = null;
          };
          utter.onend = done;
          utter.onerror = () => {
            done();
            if (attempt < 1 && myGen === speakGeneration && fromGesture) {
              speakRetryTimer = setTimeout(() => kick(attempt + 1), 180);
              return;
            }
            if (myGen === speakGeneration) markFailedAuto();
          };

          try {
            window.speechSynthesis.speak(utter);
            window.speechSynthesis.resume();
          } catch (_) {
            done();
            if (attempt < 1 && myGen === speakGeneration) {
              speakRetryTimer = setTimeout(() => kick(attempt + 1), 180);
            } else if (myGen === speakGeneration) {
              markFailedAuto();
            }
            return;
          }

          const waitMs = fromGesture ? 900 : (isMobile ? 600 : 750);
          speakRetryTimer = setTimeout(() => {
            if (myGen !== speakGeneration || started) return;
            if (attempt < 1) {
              try { window.speechSynthesis.cancel(); } catch (_) { /* ignore */ }
              kick(attempt + 1);
              return;
            }
            done();
            markFailedAuto();
          }, waitMs);
        }, delay);
      };

      const begin = () => kick(0);

      if (!loadVoices().length) {
        let begun = false;
        const once = () => {
          if (begun) return;
          begun = true;
          window.speechSynthesis.removeEventListener("voiceschanged", once);
          begin();
        };
        window.speechSynthesis.addEventListener("voiceschanged", once);
        setTimeout(once, isIOS ? 300 : 600);
        // On gesture path, still try immediately — voices may load mid-way
        if (fromGesture || immediate) begin();
        return;
      }
      begin();
    }

    let welcomeBubbleEl = null;

    function tryWelcomeSpeak() {
      if (welcomeSpoken || !ttsEnabled) return;
      unlockSpeechAudio();
      const btn = welcomeBubbleEl?.querySelector(".bubble-play") || null;
      speakText(WELCOME_MSG, { isWelcome: true, playBtn: btn, immediate: true, fromGesture: true });
    }

    function bindWelcomeUnlock() {
      if (welcomeUnlockBound) return;
      welcomeUnlockBound = true;
      const onGesture = () => {
        unlockSpeechAudio();
        // Flush any reply waiting for a tap (mobile autoplay policy)
        if (pendingSpeak) {
          flushPendingSpeak();
          return;
        }
        if (!welcomeSpoken) tryWelcomeSpeak();
      };
      window.addEventListener("pointerdown", onGesture, { passive: true });
      window.addEventListener("touchstart", onGesture, { passive: true });
      window.addEventListener("keydown", onGesture);
    }

    function syncTtsButton() {
      if (!ttsBtn) return;
      ttsBtn.textContent = ttsEnabled ? "🔊 Voice on" : "🔇 Voice off";
      ttsBtn.classList.toggle("off", !ttsEnabled);
    }

    if (canSpeak) {
      try {
        const saved = localStorage.getItem("filofax_tts");
        if (saved === "0") ttsEnabled = false;
        if (saved === "1") ttsEnabled = true;
      } catch (_) { /* ignore */ }
      loadVoices();
      window.speechSynthesis.onvoiceschanged = () => {
        cachedVoice = null;
        getAssistantVoice();
      };
      setTimeout(() => {
        cachedVoice = null;
        getAssistantVoice();
      }, 300);
      bindWelcomeUnlock();
    }

    if (ttsBtn) {
      ttsBtn.addEventListener("click", () => {
        unlockSpeechAudio();
        ttsEnabled = !ttsEnabled;
        try {
          localStorage.setItem("filofax_tts", ttsEnabled ? "1" : "0");
        } catch (_) { /* ignore */ }
        if (!ttsEnabled) {
          stopSpeaking();
        } else if (!welcomeSpoken) {
          tryWelcomeSpeak();
        } else {
          speakText("Voice replies on.");
        }
        syncTtsButton();
      });
      syncTtsButton();
    }

    ttsTapHint?.addEventListener("click", () => {
      unlockSpeechAudio();
      if (!flushPendingSpeak() && activePlayBtn) {
        activePlayBtn.click();
      }
    });

    function syncComposerButtons() {
      const hasText = input.value.trim().length > 0;
      micBtn.hidden = hasText;
      sendBtn.hidden = !hasText;
    }

    function formatRecTime(ms) {
      const sec = Math.floor(ms / 1000);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function showRecordingUi() {
      textRow.hidden = true;
      recRow.hidden = false;
      recStartedAt = Date.now();
      recTimerEl.textContent = "0:00";
      liveFinal = "";
      liveInterim = "";
      updateLiveTranscript();
      clearInterval(recTimerId);
      recTimerId = setInterval(() => {
        recTimerEl.textContent = formatRecTime(Date.now() - recStartedAt);
      }, 250);
    }

    function hideRecordingUi() {
      clearInterval(recTimerId);
      recTimerId = null;
      recRow.hidden = true;
      textRow.hidden = false;
      syncComposerButtons();
      input.focus();
    }

    function updateLiveTranscript() {
      const finalPart = liveFinal.trim();
      const interimPart = liveInterim.trim();
      recLiveEl.classList.toggle("has-text", !!(finalPart || interimPart));
      if (!finalPart && !interimPart) {
        recLiveEl.innerHTML = "";
        return;
      }
      recLiveEl.innerHTML =
        (finalPart ? escapeHtml(finalPart) + (interimPart ? " " : "") : "") +
        (interimPart ? `<span class="interim">${escapeHtml(interimPart)}</span>` : "");
      recLiveEl.scrollTop = recLiveEl.scrollHeight;
    }

    function getLiveTranscript() {
      return `${liveFinal} ${liveInterim}`.replace(/\s+/g, " ").trim();
    }

    function stopSpeechRecognition() {
      if (!recognition) return;
      try {
        recognition.onend = null;
        recognition.stop();
      } catch (_) { /* ignore */ }
      recognition = null;
    }

    function startSpeechRecognition() {
      if (!SpeechRecognitionAPI) return false;
      recognition = new SpeechRecognitionAPI();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.lang = navigator.language || "en-US";

      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const piece = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            liveFinal += (liveFinal && !liveFinal.endsWith(" ") ? " " : "") + piece;
          } else {
            interim += piece;
          }
        }
        liveInterim = interim;
        updateLiveTranscript();
      };

      recognition.onerror = (event) => {
        if (event.error === "aborted" || event.error === "no-speech") return;
        if (event.error === "not-allowed") {
          addBubble("Microphone permission denied for live transcription.", "bot");
        }
      };

      recognition.onend = () => {
        // Chrome stops after a pause — keep listening while recording
        if (isRecording && recognition) {
          try { recognition.start(); } catch (_) { /* already started */ }
        }
      };

      try {
        recognition.start();
        return true;
      } catch (_) {
        recognition = null;
        return false;
      }
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      micBtn.disabled = busy;
      stopRecBtn.disabled = busy;
      cancelRecBtn.disabled = busy;
      input.disabled = busy;
    }

    function addBubble(text, who, extraClass = "") {
      const div = document.createElement("div");
      div.className = `bubble ${who}${extraClass ? " " + extraClass : ""}`;

      if (who === "bot" && !extraClass.includes("typing") && canSpeak) {
        div.classList.add("has-play");
        const avatar = document.createElement("span");
        avatar.className = "bubble-avatar";
        avatar.textContent = "F";
        avatar.setAttribute("aria-hidden", "true");
        const body = document.createElement("div");
        body.className = "bubble-text";
        body.textContent = text;
        const play = document.createElement("button");
        play.type = "button";
        play.className = "bubble-play";
        play.title = "Play this reply";
        play.setAttribute("aria-label", "Play reply");
        play.textContent = "▶";
        play.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          speakText(text, { force: true, playBtn: play });
        });
        div.appendChild(avatar);
        div.appendChild(body);
        div.appendChild(play);
      } else if (who === "bot" && !extraClass.includes("typing")) {
        const avatar = document.createElement("span");
        avatar.className = "bubble-avatar";
        avatar.textContent = "F";
        avatar.setAttribute("aria-hidden", "true");
        const body = document.createElement("div");
        body.className = "bubble-text";
        body.textContent = text;
        div.classList.add("has-play");
        div.appendChild(avatar);
        div.appendChild(body);
      } else {
        div.textContent = text;
      }

      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      return div;
    }

    function showTyping(label = "Processing…") {
      const div = document.createElement("div");
      div.className = "bubble bot typing";
      div.id = "typingIndicator";
      div.innerHTML = `<span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="typing-label">${escapeHtml(label)}</span>`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      return div;
    }

    function hideTyping() {
      document.getElementById("typingIndicator")?.remove();
    }

    function setPending(event) {
      pendingEvent = event;
    }

    function setConfirmUi(show) {
      if (!confirmActions) return;
      confirmActions.hidden = !show;
    }

    function setPlaceholder(nextField) {
      if (!input) return;
      input.placeholder = PLACEHOLDERS[nextField] || PLACEHOLDERS.default;
    }

    function setSlotChips(suggestions) {
      if (!slotChips) return;
      const list = Array.isArray(suggestions) ? suggestions.filter(Boolean) : [];
      // Confirm screen uses dedicated Yes/No — skip duplicating Yes/No as chips
      const chips = list.filter((s) => {
        const t = String(s).toLowerCase();
        return t !== "yes, save" && t !== "no";
      });
      slotChips.innerHTML = "";
      if (!chips.length) {
        slotChips.hidden = true;
        return;
      }
      chips.forEach((label) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = label;
        btn.addEventListener("click", async () => {
          unlockSpeechAudio();
          addBubble(label, "user");
          setSlotChips([]);
          await chat(label, false);
        });
        slotChips.appendChild(btn);
      });
      slotChips.hidden = false;
    }

    function mergePending(prev, next) {
      if (!next) return prev || null;
      if (!prev) return next;
      const keys = ["date", "time", "category", "label", "notes"];
      const out = { ...prev, ...next };
      for (const k of keys) {
        const n = next[k];
        const p = prev[k];
        const nOk = n !== null && n !== undefined && String(n).trim() !== "" && String(n).toLowerCase() !== "null";
        const pOk = p !== null && p !== undefined && String(p).trim() !== "" && String(p).toLowerCase() !== "null";
        out[k] = nOk ? n : (pOk ? p : null);
      }
      if (next._awaiting_confirm) out._awaiting_confirm = true;
      else if (prev._awaiting_confirm && next._awaiting_confirm !== false) {
        out._awaiting_confirm = true;
      }
      return out;
    }

    function applyAssistantResult(data) {
      const msg = data.message || JSON.stringify(data);
      const bubble = addBubble(msg, "bot");
      const playBtn = bubble.querySelector(".bubble-play");
      // Post-fetch autoplay is blocked on most mobiles — try speak, queue for next tap if it fails
      if (canSpeak && ttsEnabled) {
        try { window.speechSynthesis.resume(); } catch (_) { /* ignore */ }
        speakText(msg, { playBtn, immediate: false, fromGesture: false });
        // iOS / many Androids never fire onstart after fetch — offer tap-to-hear
        if (isMobile) {
          setTimeout(() => {
            const playing = playBtn && playBtn.classList.contains("playing");
            const synthBusy = (() => {
              try {
                return window.speechSynthesis.speaking || window.speechSynthesis.pending;
              } catch (_) {
                return false;
              }
            })();
            if (!playing && !synthBusy && ttsEnabled) {
              queuePendingSpeak(msg, playBtn);
            }
          }, isIOS ? 450 : 900);
        }
      }
      setConfirmUi(Boolean(data.needs_confirmation));
      const nextField = (data.missing_fields && data.missing_fields[0]) || null;
      setPlaceholder(data.needs_confirmation ? "default" : nextField);
      if (data.needs_confirmation) {
        setSlotChips(data.suggested_replies || ["Change time", "Change date"]);
      } else if (data.event || data.intent === "cancel_event") {
        setSlotChips([]);
      } else {
        setSlotChips(data.suggested_replies || []);
      }
      if (data.event) {
        setPending(null);
        setConfirmUi(false);
        setPlaceholder("default");
        return refreshEvents();
      }
      if (data.intent === "search_events") {
        if (data.events?.length) {
          const list = data.events.map((e) =>
            `• ${e.label} — ${e.event_date}${e.event_time ? " " + String(e.event_time).slice(0,5) : ""} (${e.category})`
          ).join("\n");
          const listBubble = addBubble(list, "bot");
          speakText(`Found ${data.events.length} events.`, {
            playBtn: listBubble.querySelector(".bubble-play"),
          });
        }
      } else if (data.intent === "cancel_event") {
        setPending(null);
        setConfirmUi(false);
        setPlaceholder("default");
      } else if (data.pending_event) {
        setPending(mergePending(pendingEvent, data.pending_event));
      } else if (data.missing_fields?.length) {
        setPending(mergePending(pendingEvent, data.pending_event || pendingEvent));
      }
      return Promise.resolve();
    }

    async function refreshEvents() {
      const res = await fetch(`${API}/api/events?user_id=${encodeURIComponent(userId)}`);
      const data = await res.json();
      if (!data.length) {
        eventsEl.innerHTML = '<div class="empty">No events yet.</div>';
        return;
      }
      eventsEl.innerHTML = data.map((e) => `
        <div class="event">
          <strong>${escapeHtml(e.label)}</strong>
          <span>${e.event_date}${e.event_time ? " · " + String(e.event_time).slice(0,5) : ""} · ${escapeHtml(e.category)}</span>
        </div>
      `).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    async function chat(message, confirm = false) {
      const lower = message.toLowerCase();
      const freshCreate = /\b(add|create|schedule|remind|reminder|new event|new reminder)\b/.test(lower)
        && !/^(todo|to do|important|appointment)\b/i.test(lower.trim());
      if (freshCreate) setPending(null);

      // Gesture path: unlock + play any queued reply first (mobile)
      unlockSpeechAudio();
      flushPendingSpeak();
      setBusy(true);
      showTyping("Thinking…");
      try {
        const body = {
          message,
          user_id: userId,
          confirm: Boolean(confirm),
        };
        if (pendingEvent) body.pending_event = pendingEvent;

        const res = await fetch(`${API}/api/assistant/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const raw = await res.text();
        let data = {};
        try { data = raw ? JSON.parse(raw) : {}; } catch (_) {
          throw new Error(res.ok ? "Invalid JSON from server" : (raw.slice(0, 180) || res.statusText));
        }
        if (!res.ok) {
          const errMsg = (data.error && data.error.message) || data.detail || data.message || raw.slice(0, 180) || res.statusText;
          throw new Error(errMsg);
        }
        hideTyping();
        await applyAssistantResult(data);
      } catch (err) {
        hideTyping();
        addBubble("Request failed: " + err.message, "bot");
      } finally {
        setBusy(false);
      }
    }

    async function sendVoice(blob) {
      unlockSpeechAudio();
      flushPendingSpeak();
      setBusy(true);
      showTyping("Listening / transcribing…");
      try {
        const formData = new FormData();
        formData.append("audio", blob, "note.webm");
        formData.append("user_id", userId);
        formData.append("confirm", "false");
        if (pendingEvent) {
          formData.append("pending_event", JSON.stringify(pendingEvent));
        }
        const res = await fetch(`${API}/api/assistant/voice`, {
          method: "POST",
          body: formData,
        });
        const data = await res.json().catch(() => ({}));
        hideTyping();
        if (!res.ok) {
          addBubble(data.detail || "Voice processing failed.", "bot");
          return;
        }
        if (data.transcript) {
          addBubble(data.transcript, "user", "voice");
        }
        await applyAssistantResult(data);
      } catch (err) {
        hideTyping();
        addBubble("Voice request failed: " + err.message, "bot");
      } finally {
        setBusy(false);
      }
    }

    async function finishRecordingSend() {
      const liveText = getLiveTranscript();
      hideRecordingUi();

      if (discardRecording) {
        discardRecording = false;
        audioChunks = [];
        return;
      }

      // Live transcript ready — send instantly (no Whisper wait)
      if (liveText) {
        audioChunks = [];
        addBubble(liveText, "user", "voice");
        await chat(liveText, false);
        return;
      }

      // Fallback: upload audio to server Whisper
      const blob = new Blob(audioChunks, { type: mediaRecorder?.mimeType || "audio/webm" });
      audioChunks = [];
      if (blob.size < 200) {
        addBubble("No speech detected. Try again or type your message.", "bot");
        return;
      }
      await sendVoice(blob);
    }

    async function startRecording() {
      stopSpeaking();
      discardRecording = false;
      liveFinal = "";
      liveInterim = "";
      useLiveSpeech = false;
      audioChunks = [];

      if (!SpeechRecognitionAPI && !navigator.mediaDevices?.getUserMedia) {
        addBubble("Microphone / live speech not supported. Use Chrome or Edge.", "bot");
        return;
      }

      try {
        if (navigator.mediaDevices?.getUserMedia) {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
            ? "audio/webm;codecs=opus"
            : (MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "");
          mediaRecorder = mime
            ? new MediaRecorder(mediaStream, { mimeType: mime })
            : new MediaRecorder(mediaStream);
          mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) audioChunks.push(e.data);
          };
          mediaRecorder.onstop = async () => {
            mediaStream?.getTracks().forEach((t) => t.stop());
            mediaStream = null;
            await finishRecordingSend();
          };
          mediaRecorder.start(250);
        }

        useLiveSpeech = startSpeechRecognition();
        isRecording = true;
        showRecordingUi();
        if (!useLiveSpeech) {
          recLiveEl.classList.add("has-text");
          recLiveEl.textContent = "Recording… (live text needs Chrome/Edge)";
        }
      } catch (err) {
        stopSpeechRecognition();
        mediaStream?.getTracks().forEach((t) => t.stop());
        mediaStream = null;
        addBubble("Microphone permission denied or unavailable.", "bot");
      }
    }

    function stopRecording({ discard = false } = {}) {
      if (!isRecording) return;
      discardRecording = discard;
      isRecording = false;
      stopSpeechRecognition();

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        return;
      }

      // Live-only path (no MediaRecorder)
      finishRecordingSend();
    }

    micBtn.addEventListener("click", async () => {
      unlockSpeechAudio();
      if (!isRecording) await startRecording();
    });

    stopRecBtn.addEventListener("click", () => stopRecording());
    cancelRecBtn.addEventListener("click", () => stopRecording({ discard: true }));

    input.addEventListener("input", syncComposerButtons);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      unlockSpeechAudio();
      if (isRecording) {
        stopRecording();
        return;
      }
      const text = input.value.trim();
      if (!text) return;
      addBubble(text, "user");
      input.value = "";
      syncComposerButtons();
      await chat(text, false);
    });

    confirmYes?.addEventListener("click", async () => {
      unlockSpeechAudio();
      setConfirmUi(false);
      addBubble("Yes, save", "user");
      await chat("yes", true);
    });

    confirmNo?.addEventListener("click", async () => {
      unlockSpeechAudio();
      setConfirmUi(false);
      addBubble("No", "user");
      await chat("no", false);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && isRecording) {
        e.preventDefault();
        stopRecording();
      }
      if (e.key === "Escape" && isRecording) {
        e.preventDefault();
        stopRecording({ discard: true });
      }
    });

    clearBtn.addEventListener("click", async () => {
      const ok = window.confirm("Clear chat and delete ALL saved reminders?");
      if (!ok) return;
      if (isRecording) stopRecording({ discard: true });
      stopSpeaking();
      setBusy(true);
      showTyping("Clearing…");
      try {
        const res = await fetch(
          `${API}/api/events?user_id=${encodeURIComponent(userId)}`,
          { method: "DELETE" }
        );
        const data = await res.json().catch(() => ({}));
        hideTyping();
        if (!res.ok) {
          addBubble(data.detail || "Clear failed.", "bot");
          return;
        }
        setPending(null);
        setConfirmUi(false);
        setSlotChips([]);
        setPlaceholder("default");
        logEl.innerHTML = "";
        welcomeSpoken = false;
        const msg = data.message || "Chat and reminders cleared.";
        addBubble(msg, "bot");
        addBubble(WELCOME_MSG, "bot");
        speakText(`${msg} ${WELCOME_MSG}`, { isWelcome: true });
        await refreshEvents();
      } catch (err) {
        hideTyping();
        addBubble("Clear failed: " + err.message, "bot");
      } finally {
        setBusy(false);
      }
    });

    async function checkHealth() {
      try {
        await fetch(`${API}/api/health`);
      } catch {
        /* health strip removed from UI */
      }
    }

    syncComposerButtons();
    welcomeBubbleEl = addBubble(WELCOME_MSG, "bot");
    bindWelcomeUnlock();
    setTimeout(tryWelcomeSpeak, 500);
    checkHealth();
    refreshEvents();
  </script>
</body>
</html>
