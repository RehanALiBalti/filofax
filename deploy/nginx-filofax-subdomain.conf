# Filofax — subdomain (root path)
# http://filofax.buzzwaretech.com/
#
# Install:
#   sudo SUBDOMAIN=filofax.buzzwaretech.com bash /opt/filofax/deploy/setup-subdomain.sh
#
# Does NOT change JAMS (/) or CV Builder (/cvbuilder/) on the main IP.

server {
    listen 80;
    server_name filofax.buzzwaretech.com;

    client_max_body_size 20M;

    # Entire app (UI + API) is served by FastAPI on :8002
    location / {
        proxy_pass http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }
}
